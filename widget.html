<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Mad for Audio 미니 플레이어</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%BB%3C/text%3E%3C/svg%3E">
    <script>
        (function () {
            const boot = new URLSearchParams(location.search);
            document.documentElement.dataset.theme = boot.get("theme") === "light" ? "light" : "dark";
            // 기본 스킨을 튜너형으로 — 기본형은 ?skin=basic 으로만 남긴다(하위호환)
            document.documentElement.dataset.skin = boot.get("skin") === "basic" ? "basic" : "tuner";
        })();
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-S8GLTG1KYZ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-S8GLTG1KYZ');
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17"></script>
    <style>
        :root {
            --bg: #171412;
            --panel: rgba(255, 248, 240, 0.05);
            --line: rgba(255, 244, 232, 0.12);
            --text: #f7f0e7;
            --muted: #c2b7aa;
            --accent: #d36a42;
        }

        :root[data-theme="light"] {
            --bg: #faf6f1;
            --panel: rgba(30, 24, 18, 0.05);
            --line: rgba(30, 24, 18, 0.14);
            --text: #2b2118;
            --muted: #6f6257;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        button,
        input,
        select {
            font: inherit;
            color: inherit;
        }

        button {
            border: 0;
            background: none;
            cursor: pointer;
        }

        button:focus-visible,
        input:focus-visible,
        select:focus-visible,
        a:focus-visible,
        [role="button"]:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .widget {
            width: 100%;
            max-width: 460px;
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 10px;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-play {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #fff8f2;
            background: radial-gradient(circle at 30% 30%, var(--accent) 0%, var(--accent) 60%, rgba(0, 0, 0, 0.35) 130%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25), 0 6px 14px rgba(0, 0, 0, 0.25);
            transition: transform 0.15s ease;
        }

        .btn-play:active {
            transform: scale(0.96);
        }

        .btn-play.loading {
            opacity: 0.7;
        }

        .info {
            min-width: 0;
            flex: 1;
        }

        .w-station {
            font-size: 0.98rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .w-status {
            margin-top: 2px;
            font-size: 0.78rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .eq {
            display: flex;
            gap: 3px;
            align-items: flex-end;
            height: 18px;
            flex-shrink: 0;
            visibility: hidden;
        }

        .eq.on {
            visibility: visible;
        }

        .eq i {
            width: 3px;
            border-radius: 999px;
            background: var(--accent);
            animation: eq 0.8s ease-in-out infinite alternate;
        }

        .eq i:nth-child(1) { height: 7px; animation-delay: 0s; }
        .eq i:nth-child(2) { height: 15px; animation-delay: 0.2s; }
        .eq i:nth-child(3) { height: 10px; animation-delay: 0.35s; }

        @keyframes eq {
            0% { height: 4px; opacity: 0.55; }
            100% { height: 18px; opacity: 1; }
        }

        select {
            flex: 1;
            min-width: 0;
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid var(--line);
            background: var(--panel);
            cursor: pointer;
        }

        :root[data-theme="dark"] select option,
        :root[data-theme="dark"] select optgroup {
            background: #201c19;
            color: #f7f0e7;
        }

        .vol {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .vol svg {
            width: 16px;
            height: 16px;
            fill: var(--muted);
            flex-shrink: 0;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 92px;
            height: 4px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent), var(--line));
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: #fff8f0;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: #fff8f0;
            cursor: pointer;
        }

        .home-link,
        .skin-link {
            color: var(--muted);
            font-size: 0.72rem;
            text-decoration: none;
            flex-shrink: 0;
        }

        .home-link:hover,
        .skin-link:hover {
            color: var(--text);
        }

        .skin-link.is-active {
            color: var(--text);
            font-weight: 700;
            cursor: default;
        }

        :root[data-skin="tuner"] .skin-link.is-active {
            color: #f0c064;
        }

        /* ----- 튜너 스킨 ----- */

        .tuner-dial,
        .tuner-brand,
        .sig-meter,
        .tuning-knob,
        .screw {
            display: none;
        }

        :root[data-skin="tuner"] body {
            background: #0b0a09;
        }

        :root[data-skin="tuner"] .widget {
            position: relative;
            max-width: 460px;
            margin: 0 16px;
            padding: 16px 18px 12px;
            border-radius: 4px;
            border: 1px solid #060505;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0) 7%),
                linear-gradient(0deg, rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0) 10%),
                repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.03) 0 1px, rgba(255, 255, 255, 0) 1px 2px),
                repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.05) 0 3px, rgba(0, 0, 0, 0) 3px 7px),
                linear-gradient(180deg, #403b36 0%, #2b2723 50%, #1e1b18 100%);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.18),
                inset 0 -2px 6px rgba(0, 0, 0, 0.55),
                0 16px 38px rgba(0, 0, 0, 0.6);
        }

        /* 월넛 우드 사이드 패널 */
        :root[data-skin="tuner"] .widget::before,
        :root[data-skin="tuner"] .widget::after {
            content: "";
            position: absolute;
            top: 5px;
            bottom: 5px;
            width: 16px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0) 12%, rgba(0, 0, 0, 0.3) 96%),
                repeating-linear-gradient(93deg, rgba(30, 14, 5, 0.35) 0 1px, rgba(0, 0, 0, 0) 1px 4px, rgba(60, 30, 12, 0.25) 4px 6px),
                linear-gradient(180deg, #6e4526 0%, #543115 55%, #3f2410 100%);
            box-shadow: inset 0 1px 1px rgba(255, 224, 180, 0.25), inset 0 -2px 4px rgba(0, 0, 0, 0.5);
        }

        :root[data-skin="tuner"] .widget::before {
            left: -16px;
            border-radius: 7px 0 0 7px;
        }

        :root[data-skin="tuner"] .widget::after {
            right: -16px;
            border-radius: 0 7px 7px 0;
        }

        /* 코너 나사 */
        :root[data-skin="tuner"] .screw {
            display: block;
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background:
                linear-gradient(135deg, rgba(0, 0, 0, 0) 44%, rgba(0, 0, 0, 0.7) 46%, rgba(0, 0, 0, 0.7) 54%, rgba(0, 0, 0, 0) 56%),
                radial-gradient(circle at 35% 30%, #7a7369, #3c3730 60%, #17140f 100%);
            box-shadow: 0 1px 1px rgba(255, 255, 255, 0.12), inset 0 0 2px rgba(0, 0, 0, 0.8);
        }

        .screw.s1 { top: 5px; left: 6px; }
        .screw.s2 { top: 5px; right: 6px; }
        .screw.s3 { bottom: 5px; left: 6px; }
        .screw.s4 { bottom: 5px; right: 6px; }

        /* MP3 모드에서는 다이얼 자체가 탐색(시크) 컨트롤이 된다 */
        :root[data-skin="tuner"] .tuner-dial.media {
            cursor: pointer;
        }

        :root[data-skin="tuner"] .tuner-dial.media .dial-needle {
            transition: left 0.25s ease;
        }

        .dial-num.edge-l {
            transform: none;
        }

        .dial-num.edge-r {
            transform: translateX(-100%);
        }

        :root[data-skin="tuner"] .tuner-dial {
            display: block;
            position: relative;
            height: 82px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #060504;
            background:
                radial-gradient(ellipse 75% 90% at 42% 115%, rgba(240, 158, 74, 0.22), transparent 72%),
                radial-gradient(ellipse at 50% -40%, rgba(255, 200, 130, 0.05), transparent 60%),
                linear-gradient(180deg, #120d09 0%, #221a11 58%, #150f09 100%);
            box-shadow:
                inset 0 3px 14px rgba(0, 0, 0, 0.8),
                inset 0 0 34px rgba(238, 158, 78, 0.08),
                0 1px 0 rgba(255, 255, 255, 0.09);
        }

        /* 다이얼 유리 반사광 */
        .dial-glass {
            position: absolute;
            inset: 0;
            z-index: 4;
            pointer-events: none;
            background:
                linear-gradient(112deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.025) 16%, rgba(255, 255, 255, 0) 30%),
                linear-gradient(0deg, rgba(0, 0, 0, 0.32), rgba(0, 0, 0, 0) 26%);
        }

        .dial-scale {
            position: absolute;
            left: 14px;
            right: 124px;
            top: 0;
            bottom: 0;
        }

        .dial-unit {
            position: absolute;
            right: 0;
            bottom: 8px;
            font-size: 0.5rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: rgba(232, 176, 106, 0.55);
        }

        .dial-fm {
            position: absolute;
            left: 0;
            bottom: 8px;
            font-size: 0.5rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            color: rgba(255, 106, 78, 0.8);
            text-shadow: 0 0 6px rgba(255, 106, 78, 0.4);
        }

        .dial-tick {
            position: absolute;
            bottom: 18px;
            width: 1px;
            height: 11px;
            background: linear-gradient(180deg, rgba(240, 192, 128, 0.55), rgba(232, 176, 106, 0.2));
        }

        .dial-tick.major {
            height: 20px;
            width: 2px;
            background: linear-gradient(180deg, rgba(248, 208, 150, 0.9), rgba(232, 176, 106, 0.35));
            box-shadow: 0 0 4px rgba(240, 180, 100, 0.35);
        }

        .dial-num {
            position: absolute;
            top: 9px;
            transform: translateX(-50%);
            font-size: 0.62rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            color: #efc084;
            text-shadow: 0 0 8px rgba(238, 178, 100, 0.55);
        }

        .dial-needle {
            position: absolute;
            top: 5px;
            bottom: 5px;
            width: 2px;
            margin-left: -1px;
            z-index: 2;
            background: linear-gradient(180deg, #ff7a58, #e5352b 70%, #b8221a);
            box-shadow:
                0 0 8px rgba(255, 84, 60, 0.9),
                0 0 20px rgba(255, 84, 60, 0.4),
                1px 2px 3px rgba(0, 0, 0, 0.6);
            transition: left 1.1s cubic-bezier(0.16, 0.84, 0.24, 1.02);
        }

        .freq-readout {
            position: absolute;
            right: 11px;
            top: 10px;
            bottom: 10px;
            width: 102px;
            border-radius: 5px;
            border: 1px solid #000;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0) 24%),
                #0a0505;
            box-shadow:
                inset 0 2px 10px rgba(0, 0, 0, 0.95),
                0 1px 0 rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
        }

        .freq-digits {
            font-family: "SF Mono", Consolas, "D2Coding", monospace;
            font-size: 1.42rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: #ff4a2d;
            text-shadow: 0 0 8px rgba(255, 74, 45, 0.85), 0 0 20px rgba(255, 74, 45, 0.35);
            line-height: 1;
        }

        .readout-sub {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.56rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            color: #ad967e;
        }

        .lamp {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #3a2f28;
            box-shadow: inset 0 0 2px #000;
        }

        .lamp.on {
            background: #58e07a;
            box-shadow: 0 0 6px rgba(88, 224, 122, 0.9), 0 0 14px rgba(88, 224, 122, 0.4);
        }

        :root[data-skin="tuner"] .btn-play {
            border: 1px solid #0d0b09;
            color: #f0c064;
            background: radial-gradient(circle at 32% 28%, #5a5249, #2e2a24 58%, #171310 100%);
            box-shadow:
                inset 0 1px 1px rgba(255, 255, 255, 0.28),
                inset 0 -3px 5px rgba(0, 0, 0, 0.6),
                0 5px 12px rgba(0, 0, 0, 0.5);
            transition: box-shadow 0.4s ease, transform 0.15s ease;
        }

        :root[data-skin="tuner"] .btn-play.playing-glow {
            box-shadow:
                inset 0 1px 1px rgba(255, 255, 255, 0.28),
                inset 0 -3px 5px rgba(0, 0, 0, 0.6),
                0 0 12px rgba(240, 192, 100, 0.35),
                0 5px 12px rgba(0, 0, 0, 0.5);
        }

        :root[data-skin="tuner"] .eq {
            display: none;
        }

        /* 아날로그 시그널 미터 */
        :root[data-skin="tuner"] .sig-meter {
            display: block;
            width: 66px;
            height: 46px;
            flex-shrink: 0;
            border-radius: 5px;
            border: 1px solid #0a0806;
            overflow: hidden;
            background: linear-gradient(180deg, #f6ecd2 0%, #ecdcb6 70%, #dfcda4 100%);
            box-shadow:
                inset 0 2px 5px rgba(80, 50, 20, 0.35),
                inset 0 0 12px rgba(120, 80, 30, 0.18),
                0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .sig-meter svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        .sig-meter .m-tick {
            stroke: #4a3a22;
            stroke-width: 0.9;
        }

        .sig-meter .m-tick.red {
            stroke: #c03222;
            stroke-width: 1.3;
        }

        .sig-meter .m-label {
            font-size: 4.6px;
            font-weight: 700;
            letter-spacing: 0.16em;
            fill: #6b5636;
            text-anchor: middle;
        }

        .sig-meter .m-needle {
            stroke: #1c1712;
            stroke-width: 1.1;
            stroke-linecap: round;
        }

        .sig-meter .m-pivot {
            fill: #1c1712;
        }

        /* 튜닝 노브 */
        :root[data-skin="tuner"] .tuning-knob {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 54px;
            height: 54px;
            flex-shrink: 0;
            border-radius: 50%;
            cursor: pointer;
            background:
                repeating-conic-gradient(from 0deg, #45403a 0deg 4deg, #201d19 4deg 8deg);
            border: 1px solid #0b0a08;
            box-shadow:
                inset 0 2px 3px rgba(255, 255, 255, 0.18),
                inset 0 -3px 5px rgba(0, 0, 0, 0.65),
                0 6px 14px rgba(0, 0, 0, 0.55);
        }

        .knob-cap {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            position: relative;
            background: radial-gradient(circle at 34% 28%, #6a635a, #38332d 55%, #1a1713 100%);
            box-shadow:
                inset 0 1px 1px rgba(255, 255, 255, 0.3),
                inset 0 -2px 4px rgba(0, 0, 0, 0.7),
                0 2px 5px rgba(0, 0, 0, 0.5);
            transition: transform 1.1s cubic-bezier(0.16, 0.84, 0.24, 1.02);
        }

        .knob-dot {
            position: absolute;
            top: 4px;
            left: 50%;
            width: 4px;
            height: 4px;
            margin-left: -2px;
            border-radius: 50%;
            background: #f0c064;
            box-shadow: 0 0 5px rgba(240, 192, 100, 0.8);
        }

        :root[data-skin="tuner"] .w-station {
            color: #f2e3c8;
        }

        :root[data-skin="tuner"] .w-status {
            color: #b7a791;
        }

        :root[data-skin="tuner"] select {
            background: #1b1815;
            border-color: #0d0b0a;
            color: #e8dcc9;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.6);
        }

        :root[data-skin="tuner"] select option,
        :root[data-skin="tuner"] select optgroup {
            background: #1b1815;
            color: #e8dcc9;
        }

        :root[data-skin="tuner"] input[type="range"]::-webkit-slider-thumb {
            border-color: #e8b06a;
            background: #2e2a24;
        }

        :root[data-skin="tuner"] input[type="range"]::-moz-range-thumb {
            border-color: #e8b06a;
            background: #2e2a24;
        }

        :root[data-skin="tuner"] .tuner-brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 2px;
            font-size: 0.56rem;
            font-weight: 600;
            letter-spacing: 0.22em;
            color: rgba(255, 244, 226, 0.34);
            text-shadow: 0 1px 0 rgba(0, 0, 0, 0.6);
        }

        /* ----- 컴팩트 크기 자동 대응 (예: 300×150 임베드) ----- */

        @media (max-width: 340px), (max-height: 200px) {
            body {
                padding: 4px;
            }

            .widget {
                gap: 6px;
            }

            .row {
                gap: 7px;
            }

            .btn-play {
                width: 38px;
                height: 38px;
            }

            .btn-play svg {
                width: 18px;
                height: 18px;
            }

            .w-station {
                font-size: 0.86rem;
            }

            .w-status {
                font-size: 0.68rem;
                margin-top: 1px;
            }

            select {
                padding: 6px 8px;
                font-size: 0.78rem;
                border-radius: 8px;
            }

            input[type="range"] {
                width: 64px;
            }

            .home-link,
            .skin-link {
                display: none;
            }

            :root[data-skin="tuner"] .widget {
                margin: 0;
                padding: 8px 10px;
            }

            :root[data-skin="tuner"] .widget::before,
            :root[data-skin="tuner"] .widget::after,
            :root[data-skin="tuner"] .screw,
            :root[data-skin="tuner"] .sig-meter,
            :root[data-skin="tuner"] .tuning-knob {
                display: none;
            }

            :root[data-skin="tuner"] .tuner-dial {
                height: 46px;
            }

            :root[data-skin="tuner"] .tuner-brand {
                display: none;
            }

            .dial-fm,
            .dial-unit {
                display: none;
            }

            .dial-scale {
                left: 8px;
                right: 88px;
            }

            .dial-tick {
                bottom: 8px;
                height: 8px;
            }

            .dial-tick.major {
                height: 14px;
            }

            .dial-num {
                top: 4px;
                font-size: 0.5rem;
            }

            .dial-needle {
                top: 4px;
                bottom: 4px;
            }

            .freq-readout {
                width: 72px;
                right: 6px;
                top: 5px;
                bottom: 5px;
                gap: 1px;
            }

            .freq-digits {
                font-size: 0.98rem;
            }

            .readout-sub {
                font-size: 0.46rem;
                gap: 3px;
            }

            .lamp {
                width: 5px;
                height: 5px;
            }
        }

        /* 아주 낮은 높이(<130px)에서는 다이얼을 접고 컨트롤만 남긴다 */
        @media (max-height: 130px) {
            :root[data-skin="tuner"] .tuner-dial {
                display: none;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation: none !important;
                transition: none !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <main class="widget" aria-label="Mad for Audio 미니 플레이어">
        <span class="screw s1" aria-hidden="true"></span>
        <span class="screw s2" aria-hidden="true"></span>
        <span class="screw s3" aria-hidden="true"></span>
        <span class="screw s4" aria-hidden="true"></span>
        <div class="tuner-dial" aria-hidden="true">
            <div class="dial-scale" id="dialScale">
                <span class="dial-fm">FM</span>
                <span class="dial-unit">MHz</span>
                <div class="dial-needle" id="dialNeedle"></div>
            </div>
            <div class="freq-readout">
                <div class="freq-digits" id="freqDigits">--.-</div>
                <div class="readout-sub"><span class="lamp" id="lampStereo"></span><span id="readoutLabel">FM STEREO</span></div>
            </div>
            <div class="dial-glass"></div>
        </div>
        <div class="row">
            <button class="btn-play" id="btnPlay" type="button" aria-label="재생 또는 일시정지" aria-pressed="false">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path id="playIcon" d="M8 5v14l11-7z"></path>
                </svg>
            </button>
            <div class="info">
                <div class="w-station" id="wStation" aria-live="polite" aria-atomic="true"></div>
                <div class="w-status" id="wStatus" role="status" aria-live="polite" aria-atomic="true">재생 버튼을 눌러 시작하세요.</div>
            </div>
            <div class="eq" id="eq" aria-hidden="true"><i></i><i></i><i></i></div>
            <div class="sig-meter" aria-hidden="true">
                <svg viewBox="0 0 66 46">
                    <text class="m-label" x="33" y="8">SIGNAL</text>
                    <line class="m-tick" x1="16.95" y1="22.17" x2="13.6" y2="18.45"></line>
                    <line class="m-tick" x1="21.74" y1="18.81" x2="19.39" y2="14.39"></line>
                    <line class="m-tick" x1="27.19" y1="16.72" x2="25.98" y2="11.87"></line>
                    <line class="m-tick" x1="33" y1="16" x2="33" y2="11"></line>
                    <line class="m-tick" x1="38.81" y1="16.72" x2="40.02" y2="11.87"></line>
                    <line class="m-tick red" x1="44.26" y1="18.81" x2="46.61" y2="14.39"></line>
                    <line class="m-tick red" x1="49.05" y1="22.17" x2="52.4" y2="18.45"></line>
                    <g id="meterNeedle" transform="rotate(-42 33 40)">
                        <line class="m-needle" x1="33" y1="40" x2="33" y2="13"></line>
                    </g>
                    <circle class="m-pivot" cx="33" cy="40" r="2.6"></circle>
                </svg>
            </div>
            <div class="tuning-knob" id="tuningKnob" role="button" tabindex="0" aria-label="튜닝 노브 — 클릭 또는 휠로 채널 전환" title="클릭 또는 휠로 채널 전환">
                <div class="knob-cap" id="knobCap"><span class="knob-dot"></span></div>
            </div>
        </div>
        <div class="row">
            <select id="stationSelect" aria-label="채널 선택">
                <option id="mediaOption" value="__media__" hidden>♪</option>
            </select>
            <div class="vol">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"></path></svg>
                <input type="range" id="volume" min="0" max="100" value="80" aria-label="볼륨">
            </div>
            <span class="skin-link is-active" id="tunerLink" aria-current="page">튜너형</span>
            <a class="skin-link" id="turntableLink" href="turntable.html">턴테이블형</a>
            <a class="home-link" id="systemLink" href="index.html">오디오 시스템 ↗</a>
        </div>
        <div class="tuner-brand" aria-hidden="true">
            <span>NATURAL SOUND</span>
            <span>FM STEREO TUNER</span>
        </div>
    </main>

    <!-- crossorigin을 붙이지 않는다: CORS 헤더 없는 서버의 MP3도 재생돼야 한다 (위젯은 Web Audio 캡처를 쓰지 않음) -->
    <audio id="audioPlayer"></audio>

    <script src="stations.js"></script>
    <script src="player-core.js"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const stations = FMRadio.stations;
        const audio = document.getElementById("audioPlayer");
        const btnPlay = document.getElementById("btnPlay");
        const playIcon = document.getElementById("playIcon");
        const wStation = document.getElementById("wStation");
        const wStatus = document.getElementById("wStatus");
        const eq = document.getElementById("eq");
        const select = document.getElementById("stationSelect");
        const volume = document.getElementById("volume");
        const dialScale = document.getElementById("dialScale");
        const dialNeedle = document.getElementById("dialNeedle");
        const freqDigits = document.getElementById("freqDigits");
        const lampStereo = document.getElementById("lampStereo");
        const systemLink = document.getElementById("systemLink");
        const meterNeedle = document.getElementById("meterNeedle");
        const tuningKnob = document.getElementById("tuningKnob");
        const knobCap = document.getElementById("knobCap");
        const mediaOption = document.getElementById("mediaOption");
        const readoutLabel = document.getElementById("readoutLabel");
        const tunerDial = document.querySelector(".tuner-dial");
        const dialFm = document.querySelector(".dial-fm");
        const dialUnit = document.querySelector(".dial-unit");

        const skin = document.documentElement.dataset.skin;
        const TUNER_ACCENT = "#e8b06a";
        const DIAL_MIN = 87.5;
        const DIAL_MAX = 108.5;

        // 브라우저 임베드는 같은 출처만 기본 허용한다. 교차 출처 부모는 위젯 URL에
        // allowedOrigin을 명시해야 하며, nonce를 주면 모든 명령·상태에 같은 값을 요구한다.
        // file:// 기반 트레이 셸은 origin이 불투명(null)이므로 source 고정 + null origin으로 제한한다.
        const isTray = params.get("chrome") === "tray";
        function normalizeAllowedOrigin(value) {
            if (!value) return location.origin;
            try {
                const origin = new URL(value).origin;
                return origin === "null" ? location.origin : origin;
            } catch (error) {
                console.warn("allowedOrigin 형식이 올바르지 않아 같은 출처만 허용합니다.");
                return location.origin;
            }
        }
        const opaqueOrigin = location.origin === "null";
        const allowedOrigin = (isTray || opaqueOrigin) ? "null" : normalizeAllowedOrigin(params.get("allowedOrigin"));
        const integrationNonce = params.get("nonce") || "";
        const messageTargetOrigin = (isTray || opaqueOrigin) ? "*" : allowedOrigin;

        function integrationPayload(message) {
            return integrationNonce ? Object.assign({}, message, { nonce: integrationNonce }) : message;
        }

        function postIntegrationMessage(target, message) {
            if (!target) return;
            target.postMessage(integrationPayload(message), messageTargetOrigin);
        }

        function isTrustedMessage(event) {
            const knownSource = (window.parent !== window && event.source === window.parent)
                || (!!window.opener && event.source === window.opener);
            if (!knownSource) return false;
            if (isTray || opaqueOrigin) return event.origin === "null";
            if (event.origin !== allowedOrigin) return false;
            return !integrationNonce || (event.data && event.data.nonce === integrationNonce);
        }

        if (isTray) {
            systemLink.addEventListener("click", (event) => {
                event.preventDefault();
                if (window.parent && window.parent !== window) {
                    postIntegrationMessage(window.parent, { type: "fmRadio:openView", view: "system" });
                }
            });
            document.getElementById("turntableLink").addEventListener("click", (event) => {
                event.preventDefault();
                if (window.parent && window.parent !== window) {
                    postIntegrationMessage(window.parent, { type: "fmRadio:openView", view: "turntable" });
                }
            });
        }

        const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

        let current = stations.find((item) => item.id === params.get("station")) || stations[0];
        let isPlaying = false;
        let isLoading = false;
        let loadedId = null;
        let player = null; // PlayerCore 핸들
        let media = null; // MP3 모드: { url, title } — null이면 라디오 모드
        let dialSeeking = false;

        audio.volume = 0.8;

        for (const [group, label] of Object.entries(FMRadio.groupLabels)) {
            const groupStations = stations.filter((item) => item.group === group);
            if (!groupStations.length) continue;
            const optgroup = document.createElement("optgroup");
            optgroup.label = label;
            for (const station of groupStations) {
                const option = document.createElement("option");
                option.value = station.id;
                option.textContent = `${station.name} · ${station.desc}`;
                optgroup.append(option);
            }
            select.append(optgroup);
        }

        function freqToPercent(freq) {
            return ((freq - DIAL_MIN) / (DIAL_MAX - DIAL_MIN)) * 100;
        }

        function clearDialScale() {
            dialScale.querySelectorAll(".dial-tick, .dial-num").forEach((node) => node.remove());
        }

        function addDialMark(percent, major, label, edge) {
            const tick = document.createElement("div");
            tick.className = major ? "dial-tick major" : "dial-tick";
            tick.style.left = `${percent}%`;
            dialScale.append(tick);

            if (label !== null && label !== undefined) {
                const num = document.createElement("div");
                num.className = `dial-num${edge ? ` edge-${edge}` : ""}`;
                num.style.left = `${percent}%`;
                num.textContent = label;
                dialScale.append(num);
            }
        }

        function buildDialScale() {
            clearDialScale();
            for (let freq = 88; freq <= 108; freq += 1) {
                const major = freq % 4 === 0;
                addDialMark(freqToPercent(freq), major, major ? freq : null, "");
            }
        }

        // MP3 모드: 다이얼 눈금을 시간 눈금(0 ~ 총 길이)으로 교체
        function buildMediaScale(duration) {
            clearDialScale();
            const hasDuration = Number.isFinite(duration) && duration > 0;
            for (let i = 0; i <= 20; i += 1) {
                const major = i % 5 === 0;
                const label = major ? (hasDuration ? formatTime(duration * (i / 20)) : "") : null;
                const edge = i === 0 ? "l" : (i === 20 ? "r" : "");
                addDialMark(i * 5, major, label, edge);
            }
        }

        function applyStation() {
            select.value = current.id;
            wStation.textContent = current.name;
            document.documentElement.style.setProperty("--accent", skin === "tuner" ? TUNER_ACCENT : current.color);

            if (skin === "tuner" && typeof current.freq === "number") {
                dialNeedle.style.left = `${freqToPercent(current.freq)}%`;
                freqDigits.textContent = current.freq.toFixed(1);
                knobCap.style.transform = `rotate(${(-135 + freqToPercent(current.freq) * 2.7).toFixed(1)}deg)`;
            }
        }

        function stepStation(delta) {
            const index = stations.findIndex((item) => item.id === current.id);
            const next = stations[(index + delta + stations.length) % stations.length];
            setStation(next.id, isPlaying || isLoading);
        }

        function setStatus(text) {
            wStatus.textContent = text;
        }

        function updateUi() {
            playIcon.setAttribute("d", isPlaying ? "M6 19h4V5H6v14zm8-14v14h4V5h-4z" : "M8 5v14l11-7z");
            btnPlay.classList.toggle("loading", isLoading);
            btnPlay.classList.toggle("playing-glow", isPlaying);
            btnPlay.setAttribute("aria-pressed", String(isPlaying));
            eq.classList.toggle("on", isPlaying);
            lampStereo.classList.toggle("on", isPlaying);
            updateMeter();
        }

        // ----- 아날로그 시그널 미터 -----

        let meterRaf = null;
        let meterValue = 0;

        function meterFrame() {
            const t = performance.now() / 1000;
            const target = isPlaying
                ? 0.66 + Math.sin(t * 1.7) * 0.07 + Math.sin(t * 4.3 + 1.3) * 0.05 + Math.sin(t * 9.1 + 0.4) * 0.03
                : 0;
            meterValue += (target - meterValue) * 0.07;

            if (!isPlaying && meterValue < 0.004) {
                meterValue = 0;
                meterNeedle.setAttribute("transform", "rotate(-42 33 40)");
                meterRaf = null;
                return;
            }

            const angle = -42 + meterValue * 84;
            meterNeedle.setAttribute("transform", `rotate(${angle.toFixed(2)} 33 40)`);
            meterRaf = requestAnimationFrame(meterFrame);
        }

        function updateMeter() {
            if (skin !== "tuner") return;
            if (reducedMotion.matches) {
                if (meterRaf) cancelAnimationFrame(meterRaf);
                meterRaf = null;
                meterValue = isPlaying ? 0.66 : 0;
                meterNeedle.setAttribute("transform", `rotate(${(-42 + meterValue * 84).toFixed(2)} 33 40)`);
                return;
            }
            if (meterRaf) return;
            meterRaf = requestAnimationFrame(meterFrame);
        }

        if (typeof reducedMotion.addEventListener === "function") {
            reducedMotion.addEventListener("change", updateMeter);
        } else if (typeof reducedMotion.addListener === "function") {
            reducedMotion.addListener(updateMeter);
        }

        function stopStream() {
            if (player) {
                player.destroy();
                player = null;
            }
            audio.pause();
            audio.removeAttribute("src");
            loadedId = null;
        }

        function playBlocked() {
            isPlaying = false;
            isLoading = false;
            setStatus(audio.error
                ? "파일을 불러올 수 없습니다. 주소를 확인해 주세요."
                : "재생 버튼을 눌러 시작하세요.");
            updateUi();
            broadcastState();
        }

        function startStream(url) {
            // 재생 경로(HLS/네이티브/파일)와 오류 복구는 본체와 공유하는 PlayerCore가 처리한다
            player = PlayerCore.attach(audio, url, {
                onBlocked: playBlocked,
                onRetry: (n, max) => setStatus(`연결이 불안정합니다. 다시 시도 중… (${n}/${max})`),
                onFatal: () => {
                    stopStream();
                    isLoading = false;
                    setStatus("스트림 오류 — 다시 시도해 주세요.");
                    updateUi();
                },
                onUnsupported: () => {
                    isLoading = false;
                    setStatus("이 브라우저는 HLS 스트리밍을 지원하지 않습니다.");
                    updateUi();
                }
            });
            loadedId = current.id;
        }

        async function play() {
            if (isLoading) return;
            isLoading = true;
            setStatus("연결 중…");
            updateUi();

            try {
                const url = await FMRadio.getStreamUrl(current);
                stopStream();
                startStream(url);
                gtag('event', 'play_station', {
                    station_id: current.id,
                    station_name: current.name,
                    station_group: current.group,
                    context: 'widget'
                });
            } catch (error) {
                console.error(error);
                isLoading = false;
                setStatus("연결 실패 — 잠시 후 다시 시도해 주세요.");
                updateUi();
                broadcastState();
            }
        }

        function toggle() {
            if (isPlaying) {
                audio.pause();
            } else if (media || (loadedId === current.id && (player || audio.src))) {
                audio.play().catch(playBlocked);
            } else {
                play();
            }
        }

        function setStation(id, autoplay) {
            const station = stations.find((item) => item.id === id);
            if (!station) return;
            const changed = station.id !== current.id || media !== null;
            if (media) exitMediaMode();
            current = station;
            applyStation();
            if (autoplay) {
                play();
            } else if (changed) {
                stopStream();
                isPlaying = false;
                setStatus("재생 버튼을 눌러 시작하세요.");
                updateUi();
                broadcastState();
            }
        }

        // ----- MP3(미디어) 모드 -----

        function formatTime(seconds) {
            const total = Math.max(0, Math.floor(seconds || 0));
            const minutes = Math.floor(total / 60);
            const secs = String(total % 60).padStart(2, "0");
            return `${minutes}:${secs}`;
        }

        function mediaTitleFromUrl(url) {
            try {
                const base = decodeURIComponent(new URL(url, location.href).pathname.split("/").pop() || "");
                return base.replace(/\.[a-z0-9]{2,5}$/i, "") || "오디오 파일";
            } catch (error) {
                return "오디오 파일";
            }
        }

        function playMedia(url, title, autoplay) {
            if (!url || typeof url !== "string") return;

            stopStream();
            media = { url, title: (title && String(title).trim()) || mediaTitleFromUrl(url) };

            mediaOption.hidden = false;
            mediaOption.textContent = `♪ ${media.title}`;
            select.value = "__media__";
            wStation.textContent = media.title;
            setStatus(autoplay ? "불러오는 중…" : "재생 버튼을 눌러 시작하세요.");

            if (skin === "tuner") {
                tunerDial.classList.add("media");
                buildMediaScale(NaN);
                dialFm.textContent = "♪";
                dialUnit.textContent = "TIME";
                freqDigits.textContent = "0:00";
                readoutLabel.textContent = "LOADING";
                dialNeedle.style.left = "0%";
                knobCap.style.transform = "rotate(-135deg)";
            }

            audio.src = url;
            if (autoplay) {
                audio.play().catch(playBlocked);
            }
            updateUi();
            broadcastState();

            gtag('event', 'play_media', { media_title: media.title });
        }

        function exitMediaMode() {
            media = null;
            audio.pause();
            audio.removeAttribute("src");
            mediaOption.hidden = true;
            isPlaying = false;

            if (skin === "tuner") {
                tunerDial.classList.remove("media");
                buildDialScale();
                dialFm.textContent = "FM";
                dialUnit.textContent = "MHz";
                readoutLabel.textContent = "FM STEREO";
            }
        }

        function updateSeekUi() {
            if (!media) return;
            const duration = audio.duration;
            const hasDuration = Number.isFinite(duration) && duration > 0;
            const pct = hasDuration ? (audio.currentTime / duration) * 100 : 0;

            if (skin === "tuner") {
                freqDigits.textContent = formatTime(audio.currentTime);
                readoutLabel.textContent = hasDuration ? `TOTAL ${formatTime(duration)}` : "LOADING";
                dialNeedle.style.left = `${pct}%`;
                knobCap.style.transform = `rotate(${(-135 + pct * 2.7).toFixed(1)}deg)`;
            } else if (isPlaying) {
                setStatus(`${formatTime(audio.currentTime)} / ${hasDuration ? formatTime(duration) : "--:--"} 재생 중`);
            }
        }

        function seekTo(seconds) {
            if (!media || !Number.isFinite(audio.duration) || audio.duration <= 0) return;
            audio.currentTime = Math.max(0, Math.min(audio.duration, seconds));
            updateSeekUi();
            broadcastState();
        }

        function setVolume(value) {
            const level = Math.max(0, Math.min(100, Number(value)));
            if (Number.isNaN(level)) return;
            audio.volume = level / 100;
            volume.value = level;
            broadcastState();
        }

        // ----- 외부 연동(postMessage) -----

        function stateMessage(type) {
            const message = {
                type: type || "fmRadio:state",
                mode: media ? "media" : "radio",
                station: media ? null : current.id,
                stationName: media ? media.title : current.name,
                playing: isPlaying,
                loading: isLoading,
                volume: Math.round(audio.volume * 100)
            };
            if (media) {
                message.title = media.title;
                message.url = media.url;
                message.currentTime = audio.currentTime || 0;
                message.duration = Number.isFinite(audio.duration) ? audio.duration : null;
            }
            return message;
        }

        function broadcastState() {
            const message = stateMessage();
            try {
                if (window.parent && window.parent !== window) postIntegrationMessage(window.parent, message);
                if (window.opener) postIntegrationMessage(window.opener, message);
            } catch (error) {
                console.error(error);
            }
        }

        window.addEventListener("message", (event) => {
            const data = event.data;
            if (!data || typeof data.type !== "string" || !data.type.startsWith("fmRadio:")) return;
            if (!isTrustedMessage(event)) return;

            switch (data.type) {
                case "fmRadio:play":
                    if (data.station) setStation(data.station, true);
                    else toggle();
                    break;
                case "fmRadio:pause":
                    if (isPlaying) audio.pause();
                    break;
                case "fmRadio:toggle":
                    toggle();
                    break;
                case "fmRadio:setStation":
                    setStation(data.station, data.autoplay === true);
                    break;
                case "fmRadio:setVolume":
                    setVolume(data.value);
                    break;
                case "fmRadio:playMedia":
                    playMedia(data.url, data.title, data.autoplay !== false);
                    break;
                case "fmRadio:seek":
                    if (typeof data.time === "number") {
                        seekTo(data.time);
                    } else if (typeof data.fraction === "number" && Number.isFinite(audio.duration)) {
                        seekTo(data.fraction * audio.duration);
                    }
                    break;
                case "fmRadio:getState":
                    if (event.source) postIntegrationMessage(event.source, stateMessage());
                    break;
            }
        });

        // ----- 이벤트 -----

        btnPlay.addEventListener("click", toggle);
        select.addEventListener("change", () => {
            if (select.value === "__media__") return;
            setStation(select.value, isPlaying || isLoading);
        });
        volume.addEventListener("input", () => setVolume(volume.value));

        function seekFromPointer(event) {
            if (!media || !Number.isFinite(audio.duration) || audio.duration <= 0) return;
            const rect = dialScale.getBoundingClientRect();
            if (rect.width <= 0) return;
            const fraction = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
            seekTo(fraction * audio.duration);
        }

        tunerDial.addEventListener("pointerdown", (event) => {
            if (!media) return;
            dialSeeking = true;
            try {
                tunerDial.setPointerCapture(event.pointerId);
            } catch (error) {
                console.error(error);
            }
            seekFromPointer(event);
        });
        tunerDial.addEventListener("pointermove", (event) => {
            if (dialSeeking) seekFromPointer(event);
        });
        tunerDial.addEventListener("pointerup", () => { dialSeeking = false; });
        tunerDial.addEventListener("pointercancel", () => { dialSeeking = false; });

        audio.addEventListener("loadedmetadata", () => {
            if (media && skin === "tuner") {
                buildMediaScale(audio.duration);
            }
            updateSeekUi();
        });
        audio.addEventListener("timeupdate", () => updateSeekUi());

        audio.addEventListener("ended", () => {
            if (!media) return;
            isPlaying = false;
            setStatus("재생이 끝났습니다.");
            updateUi();
            broadcastState();
            try {
                if (window.parent && window.parent !== window) postIntegrationMessage(window.parent, stateMessage("fmRadio:ended"));
                if (window.opener) postIntegrationMessage(window.opener, stateMessage("fmRadio:ended"));
            } catch (error) {
                console.error(error);
            }
        });

        audio.addEventListener("error", () => {
            if (!media) return;
            isPlaying = false;
            isLoading = false;
            setStatus("파일을 불러올 수 없습니다. 주소를 확인해 주세요.");
            updateUi();
            broadcastState();
        });

        let lastKnobStep = 0;

        tuningKnob.addEventListener("wheel", (event) => {
            event.preventDefault();
            if (media) {
                seekTo((audio.currentTime || 0) + (event.deltaY > 0 ? 10 : -10));
                return;
            }
            const now = Date.now();
            if (now - lastKnobStep < 250) return;
            lastKnobStep = now;
            stepStation(event.deltaY > 0 ? 1 : -1);
        }, { passive: false });

        tuningKnob.addEventListener("click", () => {
            if (media) {
                seekTo((audio.currentTime || 0) + 10);
                return;
            }
            stepStation(1);
        });
        tuningKnob.addEventListener("keydown", (event) => {
            if (event.code === "Enter" || event.code === "Space") {
                event.preventDefault();
                if (media) {
                    seekTo((audio.currentTime || 0) + 10);
                } else {
                    stepStation(1);
                }
            }
        });

        audio.addEventListener("playing", () => {
            isPlaying = true;
            isLoading = false;
            setStatus(`${media ? media.title : current.name} 재생 중`);
            if ("mediaSession" in navigator) {
                try {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: media ? media.title : current.name,
                        artist: media ? "MP3 재생" : (current.desc || "Mad for Audio"),
                        album: "Mad for Audio 미니 플레이어"
                    });
                } catch (error) {
                    console.error(error);
                }
            }
            updateUi();
            broadcastState();
        });

        audio.addEventListener("pause", () => {
            isPlaying = false;
            isLoading = false;
            if (audio.error) {
                setStatus("파일을 불러올 수 없습니다. 주소를 확인해 주세요.");
            } else if (media && audio.ended) {
                setStatus("재생이 끝났습니다.");
            } else {
                setStatus("일시정지됨");
            }
            updateUi();
            broadcastState();
        });

        if ("mediaSession" in navigator) {
            try {
                navigator.mediaSession.setActionHandler("play", toggle);
                navigator.mediaSession.setActionHandler("pause", toggle);
            } catch (error) {
                console.error(error);
            }
        }

        if (skin === "tuner") {
            buildDialScale();
        }

        applyStation();
        updateUi();

        try {
            if (window.parent && window.parent !== window) postIntegrationMessage(window.parent, stateMessage("fmRadio:ready"));
            if (window.opener) postIntegrationMessage(window.opener, stateMessage("fmRadio:ready"));
        } catch (error) {
            console.error(error);
        }

        const bootMedia = params.get("mp3") || params.get("media");
        if (bootMedia) {
            playMedia(bootMedia, params.get("title"), params.get("autoplay") === "1");
        } else if (params.get("autoplay") === "1") {
            // hls.js가 defer라 이 시점엔 아직 로드 전일 수 있다 — 로드 완료 후 시작
            if (document.readyState === "complete") play();
            else window.addEventListener("load", play, { once: true });
        }
    </script>
</body>
</html>
