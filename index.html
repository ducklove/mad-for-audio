<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#121110">
    <title>FM 라디오 모음</title>
    <meta name="description" content="KBS, MBC, SBS와 주요 FM 라디오를 한 화면에서 바로 재생하고 녹음, 즐겨찾기, 취침 타이머까지 지원하는 FM 라디오 모음">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%BB%3C/text%3E%3C/svg%3E">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-S8GLTG1KYZ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-S8GLTG1KYZ');
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <style>
        :root {
            --bg: #121110;
            --bg-soft: #1c1917;
            --panel: rgba(30, 27, 24, 0.9);
            --panel-soft: rgba(255, 248, 240, 0.05);
            --line: rgba(255, 244, 232, 0.1);
            --text: #f7f0e7;
            --muted: #b9aea1;
            --accent: #d36a42;
            --accent-strong: #ec8255;
            --rec: #e5484d;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            --radius-lg: 24px;
            --radius-md: 18px;
            --radius-sm: 14px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Pretendard Variable", Pretendard, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            background:
                radial-gradient(circle at top, rgba(211, 106, 66, 0.14), transparent 28%),
                linear-gradient(180deg, #201a16 0%, #131110 30%, #0d0d0d 100%);
            color: var(--text);
            min-height: 100vh;
        }

        button,
        input {
            font: inherit;
        }

        button {
            border: 0;
            background: none;
            color: inherit;
        }

        button:focus-visible,
        input:focus-visible,
        a:focus-visible {
            outline: 2px solid var(--accent-strong);
            outline-offset: 3px;
        }

        .page-shell {
            width: min(1040px, calc(100% - 28px));
            margin: 0 auto;
            padding: 18px 0 40px;
        }

        .site-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 6px 4px 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            color: #fff6ee;
            background: linear-gradient(135deg, var(--accent-strong), #9c492d);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.28), 0 8px 18px rgba(211, 106, 66, 0.22);
            flex-shrink: 0;
        }

        .brand-title {
            font-size: 1.06rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .brand-sub {
            margin-top: 2px;
            color: var(--muted);
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .live-clock {
            font-size: 0.92rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            color: #e2d7ca;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: var(--panel-soft);
            flex-shrink: 0;
        }

        .hero-visual {
            position: relative;
            overflow: hidden;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: var(--shadow);
            background:
                linear-gradient(180deg, rgba(18, 17, 16, 0.92), rgba(18, 17, 16, 0.74)),
                #2a2623;
            margin-bottom: 18px;
            min-height: 248px;
        }

        .site-banner {
            width: 100%;
            display: block;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
            filter: saturate(0.8) sepia(0.18) contrast(1.02);
        }

        .vu-canvas {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 92px;
            pointer-events: none;
            opacity: 0.85;
            z-index: 1;
        }

        .hero-player-wrap {
            position: absolute;
            left: 24px;
            right: 24px;
            bottom: 14px;
            z-index: 2;
        }

        .player-bar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            padding: 12px 14px;
            border-radius: var(--radius-lg);
            background: rgba(23, 20, 18, 0.68);
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(14px);
        }

        .player-main {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .btn-play-main {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            background: radial-gradient(circle at 30% 30%, var(--accent-strong), var(--accent) 62%, #9c492d 100%);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.28),
                0 8px 18px rgba(211, 106, 66, 0.26);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .btn-play-main:hover {
            transform: translateY(-1px);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.3),
                0 15px 28px rgba(211, 106, 66, 0.34);
        }

        .btn-play-main:active {
            transform: scale(0.98);
        }

        .now-label {
            color: #dfb287;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            margin-bottom: 4px;
        }

        .now-station {
            font-size: 1.02rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-subtext {
            margin-top: 3px;
            color: var(--muted);
            font-size: 0.84rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-side {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .btn-rec,
        .btn-timer {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: var(--panel-soft);
            color: #e2d7ca;
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, opacity 0.18s ease;
        }

        .btn-rec:hover:not(:disabled),
        .btn-timer:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.16);
        }

        .btn-rec:disabled {
            opacity: 0.38;
            cursor: not-allowed;
        }

        .btn-timer svg {
            width: 15px;
            height: 15px;
            fill: currentColor;
            flex-shrink: 0;
        }

        .btn-timer #timerLabel {
            font-variant-numeric: tabular-nums;
        }

        .btn-timer.armed {
            border-color: var(--accent-strong);
            color: #f6ead9;
            background: rgba(255, 255, 255, 0.07);
        }

        .rec-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--rec);
            flex-shrink: 0;
        }

        .rec-time {
            font-variant-numeric: tabular-nums;
            min-width: 3ch;
            text-align: left;
        }

        .btn-rec.recording {
            background: rgba(229, 72, 77, 0.16);
            border-color: rgba(229, 72, 77, 0.48);
            color: #ffd9da;
        }

        .btn-rec.recording .rec-dot {
            animation: recPulse 1.4s ease-out infinite;
        }

        @keyframes recPulse {
            0% { box-shadow: 0 0 0 0 rgba(229, 72, 77, 0.55); }
            100% { box-shadow: 0 0 0 9px rgba(229, 72, 77, 0); }
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 999px;
            background: var(--panel-soft);
        }

        .volume-control svg {
            width: 18px;
            height: 18px;
            fill: #e2d7ca;
            flex-shrink: 0;
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 104px;
            height: 4px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent), rgba(255, 255, 255, 0.18));
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: #fff8f0;
            cursor: pointer;
        }

        .volume-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: #fff8f0;
            cursor: pointer;
        }

        main {
            display: grid;
            gap: 16px;
        }

        .group {
            border-radius: var(--radius-lg);
            padding: 20px;
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
        }

        .group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 14px;
        }

        .group-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .group-title::before {
            content: "";
            width: 4px;
            height: 16px;
            border-radius: 999px;
            background: linear-gradient(180deg, var(--accent-strong), var(--accent));
        }

        .group-note {
            color: var(--muted);
            font-size: 0.82rem;
        }

        .station-list {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        }

        .station {
            display: flex;
            align-items: stretch;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid transparent;
            transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
        }

        .station-main {
            flex: 1;
            min-width: 0;
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            align-items: center;
            gap: 14px;
            padding: 13px 4px 13px 14px;
            border-radius: var(--radius-md) 0 0 var(--radius-md);
            text-align: left;
            cursor: pointer;
        }

        .station-fav {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            flex-shrink: 0;
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            color: rgba(255, 255, 255, 0.26);
            cursor: pointer;
            transition: color 0.18s ease;
        }

        .station-fav svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .station-fav:hover,
        .station-fav.faved {
            color: #f0c064;
        }

        .station:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .station.active {
            background: linear-gradient(135deg, rgba(211, 106, 66, 0.15), rgba(255, 255, 255, 0.04));
            border-color: rgba(211, 106, 66, 0.34);
        }

        .station-icon {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff8f2;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            flex-shrink: 0;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .station-name {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #f4eee7;
        }

        .station-desc {
            font-size: 0.88rem;
            color: var(--muted);
            margin-top: 5px;
        }

        .station-status {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            min-width: 28px;
        }

        .station-eq {
            display: none;
            gap: 3px;
            align-items: flex-end;
            height: 18px;
        }

        .station.active .station-eq {
            display: flex;
        }

        .station.active.playing .station-eq .eq-bar {
            animation-play-state: running;
        }

        .eq-bar {
            width: 3px;
            background: var(--accent);
            border-radius: 999px;
            animation: eq 0.8s ease-in-out infinite alternate;
            animation-play-state: paused;
        }

        .eq-bar:nth-child(1) { height: 6px; animation-delay: 0s; }
        .eq-bar:nth-child(2) { height: 14px; animation-delay: 0.18s; }
        .eq-bar:nth-child(3) { height: 8px; animation-delay: 0.36s; }
        .eq-bar:nth-child(4) { height: 16px; animation-delay: 0.12s; }

        @keyframes eq {
            0% { height: 4px; opacity: 0.56; }
            100% { height: 18px; opacity: 1; }
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(211, 106, 66, 0.2);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .station.loading .loading-spinner {
            display: block;
        }

        .station.loading .station-eq {
            display: none !important;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .recording-list {
            display: grid;
            gap: 10px;
        }

        .recording {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            align-items: center;
            gap: 14px;
            padding: 13px 14px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--line);
        }

        .rec-badge {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.68rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            color: #ffd9da;
            background: linear-gradient(135deg, rgba(229, 72, 77, 0.34), rgba(229, 72, 77, 0.12));
            border: 1px solid rgba(229, 72, 77, 0.3);
        }

        .rec-info {
            min-width: 0;
        }

        .rec-name {
            font-size: 0.98rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .rec-meta {
            margin-top: 4px;
            color: var(--muted);
            font-size: 0.82rem;
        }

        .rec-info audio {
            display: block;
            margin-top: 10px;
            width: min(360px, 100%);
            height: 36px;
        }

        .rec-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .rec-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: var(--panel-soft);
            color: #e2d7ca;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.18s ease, border-color 0.18s ease;
        }

        .rec-btn:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.16);
        }

        .rec-btn.danger:hover {
            background: rgba(229, 72, 77, 0.14);
            border-color: rgba(229, 72, 77, 0.4);
            color: #ffd9da;
        }

        .site-footer {
            margin-top: 22px;
            padding: 0 4px;
            color: var(--muted);
            font-size: 0.78rem;
            text-align: center;
        }

        .dial-knob {
            position: absolute;
            right: 4%;
            top: 10%;
            width: 10%;
            height: 50%;
            cursor: pointer;
            z-index: 2;
            border-radius: 50%;
        }

        @media (max-width: 720px) {
            .page-shell {
                width: min(100% - 18px, 100%);
                padding-top: 10px;
            }

            .site-header {
                padding-bottom: 12px;
            }

            .brand-sub {
                white-space: normal;
            }

            .live-clock {
                display: none;
            }

            .site-banner {
                border-radius: 0;
            }

            .hero-visual {
                border-radius: 18px;
                min-height: 252px;
            }

            .hero-player-wrap {
                left: 12px;
                right: 12px;
                bottom: 14px;
            }

            .player-bar {
                grid-template-columns: 1fr;
                align-items: stretch;
                gap: 10px;
                padding: 12px;
            }

            .player-subtext {
                white-space: normal;
            }

            .player-side {
                flex-wrap: wrap;
                justify-content: space-between;
            }

            .btn-rec,
            .btn-timer {
                flex: 1;
                justify-content: center;
            }

            .volume-control {
                flex: 1 1 100%;
                justify-content: center;
            }

            .vu-canvas {
                height: 64px;
            }

            .volume-slider {
                width: min(180px, 100%);
            }

            .group {
                padding: 16px;
            }

            .station-list {
                grid-template-columns: 1fr;
            }

            .station-main {
                grid-template-columns: auto minmax(0, 1fr);
            }

            .station-status {
                grid-column: 2;
                justify-content: flex-start;
                margin-top: 2px;
            }

            .recording {
                grid-template-columns: auto minmax(0, 1fr);
            }

            .rec-actions {
                grid-column: 1 / -1;
                flex-direction: row;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <div class="brand">
                <div class="brand-mark" aria-hidden="true">FM</div>
                <div>
                    <div class="brand-title">FM 라디오 모음</div>
                    <div class="brand-sub">KBS · MBC · CBS · SBS와 주요 FM을 한 화면에서</div>
                </div>
            </div>
            <div class="live-clock" id="liveClock" aria-label="현재 시각">--:--:--</div>
        </header>

        <section class="hero-visual" aria-label="튜너 이미지와 상태 창">
            <img class="site-banner" src="t2.png" alt="Yamaha Natural Sound FM Stereo Tuner T-2 전면 패널">
            <div class="dial-knob" onclick="playEasterEgg()" title=""></div>
            <canvas class="vu-canvas" id="vuCanvas" aria-hidden="true"></canvas>
            <div class="hero-player-wrap">
                <section class="player-bar" aria-label="현재 재생 플레이어">
                    <div class="player-main">
                        <button class="btn-play-main" id="btnPlay" type="button" aria-label="재생 또는 일시정지" onclick="togglePlay()">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path id="playIcon" d="M8 5v14l11-7z"></path>
                            </svg>
                        </button>
                        <div class="now-playing">
                            <div class="now-label">Now Playing</div>
                            <div class="now-station" id="nowStation">방송을 선택하세요</div>
                            <div class="player-subtext" id="playerSubtext">원하는 채널을 누르면 바로 연결을 시도합니다.</div>
                        </div>
                    </div>
                    <div class="player-side">
                        <button class="btn-rec" id="btnRec" type="button" aria-label="녹음 시작" onclick="toggleRecording()" disabled>
                            <span class="rec-dot" aria-hidden="true"></span>
                            <span class="rec-time" id="recTime">REC</span>
                        </button>
                        <button class="btn-timer" id="btnTimer" type="button" aria-label="취침 타이머 설정" onclick="cycleSleepTimer()">
                            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path></svg>
                            <span id="timerLabel">타이머</span>
                        </button>
                        <label class="volume-control" for="volumeSlider">
                            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"></path></svg>
                            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" aria-label="볼륨" oninput="setVolume(this.value)">
                        </label>
                    </div>
                </section>
            </div>
        </section>

        <main>
            <section class="group" id="favGroup" hidden>
                <div class="group-header">
                    <div class="group-title">즐겨찾기</div>
                    <div class="group-note" id="favNote"></div>
                </div>
                <div class="station-list" id="favList"></div>
            </section>

            <section class="group">
                <div class="group-header">
                    <div class="group-title">KBS</div>
                    <div class="group-note">5개 채널</div>

    <script>
        const stations = [

            { id: "cbsstd", name: "CBS 표준FM", desc: "98.1MHz", group: "cbs", color: "#6d7f49", type: "direct", streamUrl: "https://m-aac.cbs.co.kr/mweb_cbs981/_definst_/cbs981.stream/playlist.m3u8" },
            { id: "cbsmusic", name: "CBS 음악FM", desc: "93.9MHz", group: "cbs", color: "#5c6f8d", type: "direct", streamUrl: "https://m-aac.cbs.co.kr/mweb_cbs939/_definst_/cbs939.stream/playlist.m3u8" },
            { id: "sbslove", name: "SBS 러브FM", desc: "103.5MHz", group: "sbs", color: "#5e667d", type: "sbs-api", apiUrl: "https://apis.sbs.co.kr/play-api/1.0/livestream/lovepc/lovefm?protocol=hls&ssl=Y" },

        const audio = document.getElementById("audioPlayer");

        let currentStation = null;

        let hls = null;
        let streamLoaded = false;

        // 오디오 그래프: source → gain(청취 볼륨) → 스피커, source → recDest(원음 레벨) → MediaRecorder, source → analyser(VU)
        let audioCtx = null;
        let gainNode = null;
        let recDest = null;
        let analyser = null;
        let vuRaf = null;
        let vuData = null;
        let recorder = null;
        let recStartMs = 0;
        let recTimerId = null;
        let recordingCount = 0;
        let recDb = null;

        const SLEEP_STEPS = [0, 15, 30, 60, 90];
        let sleepIndex = 0;
        let sleepDeadline = 0;
        let sleepTicker = null;

        function loadJson(key, fallback) {
            try {
                const raw = localStorage.getItem(key);
                return raw ? JSON.parse(raw) : fallback;
            } catch (error) {
                return fallback;
            }
        }

        function saveJson(key, value) {
            try {
                localStorage.setItem(key, JSON.stringify(value));
            } catch (error) {
                console.error(error);
            }
        }

        audio.volume = volumeLevel;

        if (!window.MediaRecorder) {
            btnRec.hidden = true;
        }

        function stationInitial(name) {
            const lastWord = name.split(" ").pop() || name;
            if (/^[가-힣]{4,}$/.test(lastWord)) {
                return lastWord.substring(0, 2);
            }
            return lastWord.substring(0, 4).toUpperCase();
        }

        function stationCard(station) {
            const faved = favorites.includes(station.id);
            return `
                <div class="station" data-station="${station.id}">
                    <button class="station-main" type="button" onclick="selectStation('${station.id}')">
                        <div class="station-icon" style="background:linear-gradient(135deg, ${shadeColor(station.color, 16)}, ${shadeColor(station.color, -18)})">${stationInitial(station.name)}</div>
                        <div class="station-info">
                            <div class="station-name">${station.name}</div>
                            <div class="station-desc">${station.desc}</div>
                        </div>
                        <div class="station-status">
                            <div class="loading-spinner" aria-hidden="true"></div>
                            <div class="station-eq" aria-hidden="true">
                                <div class="eq-bar"></div>
                                <div class="eq-bar"></div>
                                <div class="eq-bar"></div>
                                <div class="eq-bar"></div>
                            </div>
                        </div>
                    </button>
                    <button class="station-fav${faved ? " faved" : ""}" type="button" aria-pressed="${faved}" aria-label="${station.name} 즐겨찾기 ${faved ? "해제" : "추가"}" onclick="toggleFavorite('${station.id}')">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 17.3l-6.2 3.7 1.6-7.1L2 9.2l7.2-.6L12 2l2.8 6.6 7.2.6-5.4 4.7 1.6 7.1z"></path></svg>
                    </button>
                </div>
            `;
        }

        function renderStations() {
            const groups = { kbs: "kbsList", mbc: "mbcList", cbs: "cbsList", sbs: "sbsList", etc: "etcList" };

            for (const [group, listId] of Object.entries(groups)) {
                const list = document.getElementById(listId);
                const groupStations = stations.filter((station) => station.group === group);
                list.innerHTML = groupStations.map((station) => stationCard(station)).join("");
            }

            const favStations = favorites
                .map((id) => stations.find((station) => station.id === id))
                .filter(Boolean);
            favGroup.hidden = favStations.length === 0;
            favNote.textContent = `${favStations.length}개 채널`;
            favList.innerHTML = favStations.map((station) => stationCard(station)).join("");

            reapplyStationState();
        }

        function cardsOf(id) {
            return document.querySelectorAll(`[data-station="${id}"]`);
        }

        function reapplyStationState() {
            if (!currentStation) return;
            cardsOf(currentStation.id).forEach((element) => {
                element.classList.add("active");
                if (isPlaying) element.classList.add("playing");
            });
        }

        function toggleFavorite(id) {
            const index = favorites.indexOf(id);
            if (index >= 0) {
                favorites.splice(index, 1);
            } else {
                favorites.push(id);
            }
            saveJson("fmRadio.favorites", favorites);
            renderStations();
            gtag('event', 'toggle_favorite', {
                station_id: id,
                favorited: index < 0
            });
        }

        async function getStreamUrl(station) {
            if (station.type === "direct") {
                return station.streamUrl;
            }

            const response = await fetch(station.apiUrl);

            if (station.type === "kbs-api") {
                const data = await response.json();
                if (data.channel_item && data.channel_item.length > 0) {
                    return data.channel_item[0].service_url;
                }
                throw new Error("KBS 스트림 URL을 가져올 수 없습니다");
            }

            if (station.type === "sbs-api") {
                const url = (await response.text()).trim();
                if (url.startsWith("http")) {
                    return url;
                }
                throw new Error("스트림 URL을 가져올 수 없습니다");
            }

            if (station.type === "mbc-api") {
                const url = (await response.text()).trim();
                if (url.startsWith("http")) {
                    return url;
                }
                throw new Error("MBC 스트림 URL을 가져올 수 없습니다");
            }

            throw new Error("알 수 없는 스트림 타입");
        }

        function applyStationTheme(station) {
            const accent = station ? station.color : "#d36a42";
            accentColor = accent;
            document.documentElement.style.setProperty("--accent", accent);
            document.documentElement.style.setProperty("--accent-strong", shadeColor(accent, 18));
        }

        function shadeColor(hex, amount) {
            const sanitized = hex.replace("#", "");
            const num = parseInt(sanitized, 16);
            const clamp = (value) => Math.max(0, Math.min(255, value));
            const r = clamp((num >> 16) + amount);
            const g = clamp(((num >> 8) & 0x00ff) + amount);
            const b = clamp((num & 0x0000ff) + amount);
            return `#${(r << 16 | g << 8 | b).toString(16).padStart(6, "0")}`;
        }

        function playStream(url) {
            if (hls) {
                hls.destroy();
                hls = null;
            }

            if (typeof Hls !== "undefined" && Hls.isSupported()) {
                // MSE 경로에서는 미리 그래프를 만들어 VU 미터를 켠다.
                // (Safari 네이티브 HLS는 MediaElementSource와 충돌할 수 있어 제외)
                ensureAudioGraph();
                streamLoaded = true;
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true
                });
                hls.loadSource(url);
                hls.attachMedia(audio);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    audio.play().catch(() => {
                        isPlaying = false;
                        updatePlayButton();
                    });
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                            hls.startLoad();
                        } else {
                            stopPlay();
                        }
                    }
                });
            } else if (audio.canPlayType("application/vnd.apple.mpegurl")) {
                streamLoaded = true;
                audio.src = url;
                audio.play().catch(() => {
                    isPlaying = false;
                    updatePlayButton();
                });
            } else {
                playerSubtext.textContent = "이 브라우저는 HLS 스트리밍을 지원하지 않습니다.";
            }
        }

        async function selectStation(id) {
            const station = stations.find((item) => item.id === id);
            if (!station) return;

            stopRecording();

            document.querySelectorAll(".station").forEach((element) => {
                element.classList.remove("active", "playing", "loading");
            });

            cardsOf(id).forEach((element) => element.classList.add("active", "loading"));
            currentStation = station;
            nowStation.textContent = station.name;
            playerSubtext.textContent = `${station.desc} 스트림에 연결 중입니다.`;
            applyStationTheme(station);

            try {
                const url = await getStreamUrl(station);
                cardsOf(id).forEach((element) => {
                    element.classList.remove("loading");
                    element.classList.add("playing");
                });
                playStream(url);
                isPlaying = true;
                updatePlayButton();
                updateMediaSession();
                saveJson("fmRadio.lastStation", station.id);
                gtag('event', 'play_station', {
                    station_id: station.id,
                    station_name: station.name,
                    station_group: station.group
                });
            } catch (error) {
                cardsOf(id).forEach((element) => element.classList.remove("loading"));
                nowStation.textContent = `${station.name} 연결 실패`;
                playerSubtext.textContent = "스트림 응답이 없거나 브라우저 정책 때문에 재생이 차단되었습니다.";
                console.error(error);
            }
        }

        function togglePlay() {
            if (!currentStation) return;

            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                playerSubtext.textContent = `${currentStation.name} 재생을 일시정지했습니다.`;
            } else {
                if (!streamLoaded) {
                    selectStation(currentStation.id);
                    return;
                }
                audio.play().then(() => {
                    isPlaying = true;
                    playerSubtext.textContent = `${currentStation.name} 재생 중입니다.`;
                    updatePlayButton();
                    updateActiveStation();
                }).catch(() => {
                    isPlaying = false;
                    playerSubtext.textContent = "브라우저가 재생을 차단했습니다. 다시 시도해 주세요.";
                    updatePlayButton();
                });
                return;
            }

            updatePlayButton();
            updateActiveStation();
        }

        function stopPlay() {
            stopRecording();

            if (hls) {
                hls.destroy();
                hls = null;
            }

            audio.pause();
            audio.src = "";
            streamLoaded = false;
            isPlaying = false;
            updatePlayButton();
            updateActiveStation();
        }

        function updatePlayButton() {
            if (isPlaying) {
                playIcon.setAttribute("d", "M6 19h4V5H6v14zm8-14v14h4V5h-4z");
            } else {
                playIcon.setAttribute("d", "M8 5v14l11-7z");
            }
            updateRecButton();
        }

        function updateActiveStation() {
            document.querySelectorAll(".station").forEach((element) => {
                element.classList.remove("playing");
            });

            if (currentStation && isPlaying) {
                cardsOf(currentStation.id).forEach((element) => element.classList.add("playing"));
            }
        }

        function playEasterEgg() {

            if (hls) {
                hls.destroy();
                hls = null;
            }

            document.querySelectorAll(".station").forEach((element) => {

            currentStation = { id: "pyongyang", name: "평양 FM", desc: "조선중앙방송", color: "#8b2020" };
            nowStation.textContent = "평양 FM";
            playerSubtext.textContent = "조선중앙방송에 연결 중입니다.";
            applyStationTheme(currentStation);

            audio.src = "https://listen7.myradio24.com/69366";
            streamLoaded = true;
            audio.play().then(() => {
                isPlaying = true;
                updatePlayButton();
                updateMediaSession();
                gtag('event', 'play_station', {
                    station_id: 'pyongyang',
                    station_name: '평양 FM',
                    station_group: 'easter_egg'
                });
            }).catch(() => {
                isPlaying = false;
                updatePlayButton();
                playerSubtext.textContent = "연결에 실패했습니다.";
            });
        }

        function setVolume(value) {
            volumeLevel = value / 100;
            if (gainNode) {
                gainNode.gain.value = volumeLevel;
            } else {
                audio.volume = volumeLevel;
            }
        }

        // ----- 녹음 -----

        function ensureAudioGraph() {
            if (audioCtx) return true;

            const Ctx = window.AudioContext || window.webkitAudioContext;
            if (!Ctx || !window.MediaRecorder) return false;

            try {
                audioCtx = new Ctx();
                const source = audioCtx.createMediaElementSource(audio);
                gainNode = audioCtx.createGain();
                recDest = audioCtx.createMediaStreamDestination();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 128;
                analyser.smoothingTimeConstant = 0.8;
                source.connect(gainNode).connect(audioCtx.destination);
                source.connect(recDest);
                source.connect(analyser);
                gainNode.gain.value = volumeLevel;
                audio.volume = 1;
                if (audioCtx.state === "suspended") {
                    audioCtx.resume();
                }
                if (isPlaying) startVu();
                return true;
            } catch (error) {
                console.error(error);
                audioCtx = null;
                gainNode = null;
                recDest = null;
                analyser = null;
                return false;
            }
        }

        function pickRecMime() {
            const candidates = [
                "audio/webm;codecs=opus",
                "audio/webm",
                "audio/mp4;codecs=mp4a.40.2",
                "audio/mp4",
                "audio/ogg;codecs=opus"
            ];
            return candidates.find((type) => MediaRecorder.isTypeSupported(type)) || "";
        }

        function toggleRecording() {
            if (recorder) {
                stopRecording();
                return;
            }

            if (!currentStation || !isPlaying) return;

            if (!ensureAudioGraph()) {
                playerSubtext.textContent = "이 브라우저에서는 녹음을 지원하지 않습니다.";
                return;
            }

            if (audioCtx.state === "suspended") {
                audioCtx.resume();
            }

            const mime = pickRecMime();
            let rec;
            try {
                rec = new MediaRecorder(recDest.stream, mime ? { mimeType: mime, audioBitsPerSecond: 128000 } : undefined);
            } catch (error) {
                console.error(error);
                playerSubtext.textContent = "녹음을 시작할 수 없습니다.";
                return;
            }

            const chunks = [];
            const station = currentStation;
            const startMs = Date.now();
            const startDate = new Date();

            rec.ondataavailable = (event) => {
                if (event.data && event.data.size > 0) chunks.push(event.data);
            };
            rec.onstop = async () => {
                if (!chunks.length) return;
                const durationMs = Date.now() - startMs;
                const type = rec.mimeType || chunks[0].type || "audio/webm";
                const record = {
                    stationId: station.id,
                    stationName: station.name,
                    startedAt: startDate.toISOString(),
                    durationMs,
                    type,
                    blob: new Blob(chunks, { type })
                };
                record.dbId = await persistRecording(record);
                addRecordingItem(record);
                playerSubtext.textContent = `${station.name} 녹음 1건을 저장 목록에 추가했습니다.`;
                gtag('event', 'record_save', {
                    station_id: station.id,
                    station_name: station.name,
                    duration_seconds: Math.round(durationMs / 1000)
                });
            };

            recorder = rec;
            recStartMs = startMs;
            rec.start(1000);

            recTimerId = setInterval(updateRecTime, 500);
            updateRecTime();
            btnRec.classList.add("recording");
            btnRec.setAttribute("aria-label", "녹음 정지 및 저장");
            playerSubtext.textContent = `${station.name} 녹음 중입니다. 정지하거나 채널을 바꾸면 자동 저장됩니다.`;

            gtag('event', 'record_start', {
                station_id: station.id,
                station_name: station.name
            });
        }

        function stopRecording() {
            if (!recorder) return;

            const active = recorder;
            recorder = null;

            clearInterval(recTimerId);
            recTimerId = null;
            btnRec.classList.remove("recording");
            btnRec.setAttribute("aria-label", "녹음 시작");
            recTimeEl.textContent = "REC";
            updateRecButton();

            if (active.state !== "inactive") {
                active.stop();
            }
        }

        function recFileExtension(mimeType) {
            if (mimeType.includes("mp4")) return "m4a";
            if (mimeType.includes("ogg")) return "ogg";
            return "webm";
        }

        function formatDuration(ms) {
            const totalSeconds = Math.max(0, Math.floor(ms / 1000));
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            const pad = (value) => String(value).padStart(2, "0");
            return hours > 0 ? `${hours}:${pad(minutes)}:${pad(seconds)}` : `${pad(minutes)}:${pad(seconds)}`;
        }

        function formatSize(bytes) {
            if (bytes >= 1024 * 1024) return `${(bytes / (1024 * 1024)).toFixed(1)}MB`;
            return `${Math.max(1, Math.round(bytes / 1024))}KB`;
        }

        function updateRecTime() {
            recTimeEl.textContent = formatDuration(Date.now() - recStartMs);
        }

        function updateRecButton() {
            btnRec.disabled = !recorder && !(currentStation && isPlaying);
        }

        function addRecordingItem(record) {
            recordingCount += 1;
            const startDate = new Date(record.startedAt);
            const url = URL.createObjectURL(record.blob);
            const ext = recFileExtension(record.type);
            const pad = (value) => String(value).padStart(2, "0");
            const stamp = `${startDate.getFullYear()}${pad(startDate.getMonth() + 1)}${pad(startDate.getDate())}_${pad(startDate.getHours())}${pad(startDate.getMinutes())}${pad(startDate.getSeconds())}`;
            const safeName = record.stationName.replace(/[\\/:*?"<>|]/g, "").replace(/\s+/g, "-");
            const fileName = `${safeName}_${stamp}.${ext}`;
            const startLabel = `${startDate.getMonth() + 1}/${startDate.getDate()} ${pad(startDate.getHours())}:${pad(startDate.getMinutes())} 시작`;

            const item = document.createElement("div");
            item.className = "recording";

            const badge = document.createElement("div");
            badge.className = "rec-badge";
            badge.textContent = "REC";

            const info = document.createElement("div");
            info.className = "rec-info";

            const name = document.createElement("div");
            name.className = "rec-name";
            name.textContent = record.stationName;

            const meta = document.createElement("div");
            meta.className = "rec-meta";
            meta.textContent = `${startLabel} · ${formatDuration(record.durationMs)} · ${formatSize(record.blob.size)}`;

            const preview = document.createElement("audio");
            preview.controls = true;
            preview.preload = "metadata";
            preview.src = url;

            info.append(name, meta, preview);

            const actions = document.createElement("div");
            actions.className = "rec-actions";

            const download = document.createElement("a");
            download.className = "rec-btn";
            download.href = url;
            download.download = fileName;
            download.textContent = "저장";

            const remove = document.createElement("button");
            remove.className = "rec-btn danger";
            remove.type = "button";
            remove.textContent = "삭제";
            remove.addEventListener("click", () => {
                preview.pause();
                URL.revokeObjectURL(url);
                deleteRecording(record.dbId);
                item.remove();
                recordingCount -= 1;
                updateRecordingsNote();
            });

            actions.append(download, remove);
            item.append(badge, info, actions);
            recordingList.prepend(item);
            updateRecordingsNote();
        }

        function updateRecordingsNote() {
            recordingsGroup.hidden = recordingCount === 0;
            const keepNote = recDb
                ? "녹음 파일은 이 브라우저에 보관됩니다."
                : "페이지를 닫으면 목록이 사라집니다. 필요한 파일은 저장해 두세요.";
            recordingsNote.textContent = `${recordingCount}개 · ${keepNote}`;
        }

        function openRecordingDb() {
            if (!window.indexedDB) return;
            try {
                const request = indexedDB.open("fm-radio", 1);
                request.onupgradeneeded = () => {
                    request.result.createObjectStore("recordings", { keyPath: "id", autoIncrement: true });
                };
                request.onsuccess = () => {
                    recDb = request.result;
                    restoreRecordings();
                    updateRecordingsNote();
                };
                request.onerror = () => {
                    console.error(request.error);
                };
            } catch (error) {
                console.error(error);
            }
        }

        function persistRecording(record) {
            return new Promise((resolve) => {
                if (!recDb) return resolve(null);
                try {
                    const request = recDb
                        .transaction("recordings", "readwrite")
                        .objectStore("recordings")
                        .add(record);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => resolve(null);
                } catch (error) {
                    console.error(error);
                    resolve(null);
                }
            });
        }

        function deleteRecording(dbId) {
            if (!recDb || dbId == null) return;
            try {
                recDb.transaction("recordings", "readwrite").objectStore("recordings").delete(dbId);
            } catch (error) {
                console.error(error);
            }
        }

        function restoreRecordings() {
            try {
                const request = recDb.transaction("recordings").objectStore("recordings").getAll();
                request.onsuccess = () => {
                    for (const saved of request.result) {
                        addRecordingItem({ ...saved, dbId: saved.id });
                    }
                };
            } catch (error) {
                console.error(error);
            }
        }

        // ----- 취침 타이머 -----

        function cycleSleepTimer() {
            sleepIndex = (sleepIndex + 1) % SLEEP_STEPS.length;
            const minutes = SLEEP_STEPS[sleepIndex];

            clearInterval(sleepTicker);
            sleepTicker = null;

            if (!minutes) {
                sleepDeadline = 0;
                btnTimer.classList.remove("armed");
                btnTimer.setAttribute("aria-label", "취침 타이머 설정");
                timerLabel.textContent = "타이머";
                return;
            }

            sleepDeadline = Date.now() + minutes * 60000;
            btnTimer.classList.add("armed");
            btnTimer.setAttribute("aria-label", `취침 타이머 ${minutes}분, 누르면 변경`);
            updateSleepLabel();
            sleepTicker = setInterval(() => {
                if (Date.now() >= sleepDeadline) {
                    expireSleepTimer();
                } else {
                    updateSleepLabel();
                }
            }, 1000);

            gtag('event', 'set_sleep_timer', { minutes });
        }

        function updateSleepLabel() {
            timerLabel.textContent = formatDuration(sleepDeadline - Date.now());
        }

        function expireSleepTimer() {
            clearInterval(sleepTicker);
            sleepTicker = null;
            sleepIndex = 0;
            sleepDeadline = 0;
            btnTimer.classList.remove("armed");
            btnTimer.setAttribute("aria-label", "취침 타이머 설정");
            timerLabel.textContent = "타이머";
            stopPlay();
            playerSubtext.textContent = "취침 타이머가 끝나 재생을 정지했습니다.";
        }

        // ----- VU 미터 -----

        function startVu() {
            if (!analyser || vuRaf) return;
            vuData = new Uint8Array(analyser.frequencyBinCount);
            vuRaf = requestAnimationFrame(drawVu);
        }

        function stopVu() {
            if (vuRaf) cancelAnimationFrame(vuRaf);
            vuRaf = null;
            vuCtx.setTransform(1, 0, 0, 1, 0, 0);
            vuCtx.clearRect(0, 0, vuCanvas.width, vuCanvas.height);
        }

        function drawVu() {
            vuRaf = requestAnimationFrame(drawVu);

            const dpr = window.devicePixelRatio || 1;
            const width = vuCanvas.clientWidth;
            const height = vuCanvas.clientHeight;
            if (vuCanvas.width !== Math.round(width * dpr) || vuCanvas.height !== Math.round(height * dpr)) {
                vuCanvas.width = Math.round(width * dpr);
                vuCanvas.height = Math.round(height * dpr);
            }

            vuCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
            vuCtx.clearRect(0, 0, width, height);
            analyser.getByteFrequencyData(vuData);

            const bars = 48;
            const gap = 3;
            const barWidth = (width - gap * (bars - 1)) / bars;
            vuCtx.fillStyle = accentColor;
            for (let i = 0; i < bars; i++) {
                // 라디오 음성 대역이 몰려 있는 저·중역(하위 72% bin)만 사용
                const value = vuData[Math.floor((i / bars) * vuData.length * 0.72)] / 255;
                const barHeight = Math.max(2, value * (height - 6));
                vuCtx.globalAlpha = 0.22 + value * 0.6;
                vuCtx.fillRect(i * (barWidth + gap), height - barHeight, barWidth, barHeight);
            }
            vuCtx.globalAlpha = 1;
        }

        // ----- Media Session / 시계 -----

        function updateMediaSession() {
            if (!("mediaSession" in navigator) || !currentStation) return;
            try {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: currentStation.name,
                    artist: currentStation.desc || "FM 라디오",
                    album: "FM 라디오 모음"
                });
            } catch (error) {
                console.error(error);
            }
        }

        if ("mediaSession" in navigator) {
            try {
                navigator.mediaSession.setActionHandler("play", togglePlay);
                navigator.mediaSession.setActionHandler("pause", togglePlay);
            } catch (error) {
                console.error(error);
            }
        }

        function tickClock() {
            const now = new Date();
            const pad = (value) => String(value).padStart(2, "0");
            liveClock.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
        }

        setInterval(tickClock, 1000);
        tickClock();

        function stepStation(delta) {
            let index = currentStation ? stations.findIndex((item) => item.id === currentStation.id) : -1;
            index = (index + delta + stations.length) % stations.length;
            selectStation(stations[index].id);
        }

        document.addEventListener("keydown", (event) => {
            const onBody = event.target === document.body;
            const onStation = event.target.closest && event.target.closest(".station");

            if (event.code === "Space" && onBody) {
                event.preventDefault();
                togglePlay();
            } else if ((event.code === "ArrowDown" || event.code === "ArrowUp") && (onBody || onStation)) {
                event.preventDefault();
                stepStation(event.code === "ArrowDown" ? 1 : -1);
            }
        });

        audio.addEventListener("pause", () => {
            stopRecording();
            stopVu();
            isPlaying = false;
            updatePlayButton();
            updateActiveStation();
        });

        audio.addEventListener("playing", () => {
            isPlaying = true;
            updatePlayButton();
            updateActiveStation();
            if (audioCtx && audioCtx.state === "suspended") {
                audioCtx.resume();
            }
            startVu();
            if (currentStation) {
                playerSubtext.textContent = `${currentStation.name} 재생 중입니다.`;
            }
        });

        function restoreLastStation() {
            const lastId = loadJson("fmRadio.lastStation", null);
            const station = stations.find((item) => item.id === lastId);
            if (!station) return;

            currentStation = station;
            nowStation.textContent = station.name;
            playerSubtext.textContent = "마지막으로 듣던 채널입니다. 재생 버튼을 누르면 연결합니다.";
            applyStationTheme(station);
            reapplyStationState();
        }

        renderStations();
        restoreLastStation();
        updateRecButton();
        openRecordingDb();
    </script>
</body>
</html>
