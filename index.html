<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#121110">
    <title>Mad for Audio — 브라우저 하이파이 랙</title>
    <meta name="description" content="진공관 앰프·명기 튜너·턴테이블·카세트 데크로 꾸민 브라우저 하이파이 랙 — 한국 FM 라이브와 음반 재생, 테이프 녹음, 취침 타이머까지. Mad for Audio.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Mad for Audio — 브라우저 하이파이 랙">
    <meta property="og:description" content="실물 튜너·앰프·카세트 데크를 재현한 하이파이 랙에서 KBS·MBC·SBS·CBS FM을 선국하고 테이프에 녹음하세요.">
    <!-- OG 크롤러는 절대 URL을 요구한다 — 커스텀 도메인 배포 시 이 URL을 바꿀 것 (README 참고) -->
    <meta property="og:url" content="https://ducklove.github.io/mad-for-audio/">
    <meta property="og:image" content="https://ducklove.github.io/mad-for-audio/docs/screenshots/desktop.png">
    <meta property="og:locale" content="ko_KR">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Mad for Audio — 브라우저 하이파이 랙">
    <meta name="twitter:description" content="실물 튜너·앰프·카세트 데크를 재현한 하이파이 랙에서 한국 FM을 선국하고 테이프에 녹음하세요.">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%BB%3C/text%3E%3C/svg%3E">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Mad for Audio">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-S8GLTG1KYZ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-S8GLTG1KYZ');
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <div class="brand">
                <div class="brand-mark" aria-hidden="true">MA</div>
                <div>
                    <h1 class="brand-title">Mad for Audio</h1>
                    <div class="brand-sub">진공관과 다이얼로 듣는 한국 FM — 브라우저 하이파이 랙</div>
                </div>
            </div>
            <div class="header-actions">
                <a class="mini-open" href="manual.html" title="기기별 리뷰와 조작 안내">설명서</a>
                <button class="mini-open" type="button" id="viewModeBtn" onclick="toggleViewMode()" title="간편 플레이어와 하이파이 랙 화면을 전환합니다">랙 보기</button>
                <button class="mini-open" type="button" onclick="toggleSettings(true)" title="튜너·앰프 모델을 선택합니다">⚙ 설정</button>
                <div class="live-clock" id="liveClock" aria-label="현재 시각">--:--:--</div>
            </div>
        </header>

        <section class="hero-visual" aria-label="튜너 이미지와 상태 창">
            <div class="tuner-stage" id="tunerStage"></div>
            <div class="rack-unit" id="eqStage" aria-label="그래픽 이퀄라이저"></div>
            <div class="rack-unit" id="ampStage" aria-label="앰프"></div>
            <div class="rack-unit" id="deckStage" aria-label="카세트 데크"></div>
            <div class="rack-unit" id="ttStage" aria-label="턴테이블"></div>
            <canvas class="vu-canvas" id="vuCanvas" aria-hidden="true"></canvas>
            <div class="hero-player-wrap">
                <section class="player-bar" aria-label="현재 재생 플레이어">
                    <div class="player-main">
                        <button class="btn-play-main" id="btnPlay" type="button" aria-label="재생 또는 일시정지" onclick="togglePlay()">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path id="playIcon" d="M8 5v14l11-7z"></path>
                            </svg>
                        </button>
                        <div class="now-playing">
                            <div class="now-label">Now Playing</div>
                            <div class="now-station" id="nowStation" aria-live="polite">방송을 선택하세요</div>
                            <span class="audio-state-chip" id="audioStateChip" hidden></span>
                            <div class="player-subtext" id="playerSubtext" aria-live="polite">원하는 채널을 누르면 바로 연결을 시도합니다.</div>
                        </div>
                    </div>
                    <div class="player-side">
                        <button class="btn-step" type="button" aria-label="이전 채널" onclick="stepStation(-1)">
                            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" fill="currentColor"></path></svg>
                        </button>
                        <button class="btn-step" type="button" aria-label="다음 채널" onclick="stepStation(1)">
                            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z" fill="currentColor"></path></svg>
                        </button>
                        <button class="btn-rec" id="btnRec" type="button" aria-label="녹음 시작" onclick="toggleRecording()" disabled>
                            <span class="rec-dot" aria-hidden="true"></span>
                            <span class="rec-time" id="recTime">REC</span>
                        </button>
                        <button class="btn-timer" id="btnTimer" type="button" aria-label="취침 타이머 설정" onclick="cycleSleepTimer()">
                            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path></svg>
                            <span id="timerLabel">타이머</span>
                        </button>
                    </div>
                </section>
            </div>
        </section>

        <div class="list-toggle-wrap">
            <button class="list-toggle" id="listToggle" type="button" aria-expanded="false" aria-controls="stationMain" onclick="toggleStationList()">
                <span id="listToggleLabel">전체 채널 목록</span>
                <svg class="list-toggle-chevron" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            </button>
        </div>
        <main id="stationMain" class="collapsed">
            <div class="list-search">
                <input id="stationSearch" type="search" placeholder="채널 검색 — 이름·주파수·설명" aria-label="채널 검색" autocomplete="off">
            </div>

            <section class="group" id="favGroup" hidden>
                <div class="group-header">
                    <div class="group-title">즐겨찾기</div>
                    <div class="group-note" id="favNote"></div>
                </div>
                <div class="station-list" id="favList"></div>
            </section>

            <!-- 방송사 그룹 섹션은 stations.js 기준으로 renderStations()가 생성한다 -->
            <div id="groupsMount"></div>

            <section class="group" id="recordingsGroup" hidden>
                <div class="group-header">
                    <div class="group-title">녹음 파일</div>
                    <div class="group-note" id="recordingsNote">페이지를 닫으면 목록이 사라집니다. 필요한 파일은 저장해 두세요.</div>
                </div>
                <div class="recording-list" id="recordingList"></div>
            </section>
        </main>

        <footer class="site-footer">
            방송 스트림의 저작권은 각 방송사에 있습니다. 녹음 파일은 개인 감상 용도로만 이용해 주세요.
            <a class="footer-link" href="embed.html">위젯·임베드 안내</a>
        </footer>
    </div>

    <div class="settings-overlay" id="settingsOverlay" hidden>
        <div class="settings-panel" role="dialog" aria-modal="true" aria-label="설정">
            <div class="settings-head">
                설정
                <button class="settings-close" type="button" aria-label="설정 닫기" onclick="toggleSettings(false)">✕</button>
            </div>
            <div class="settings-sec">
                <div class="settings-title">튜너 모델</div>
                <div class="skin-picker" id="skinPicker" role="group" aria-label="튜너 스킨 선택"></div>
            </div>
            <div class="settings-sec">
                <div class="settings-title">앰프 모델</div>
                <div class="skin-picker" id="ampPicker" role="group" aria-label="앰프 모델 선택"></div>
            </div>
            <div class="settings-sec">
                <div class="settings-title">이퀄라이저</div>
                <div class="skin-picker" id="eqPicker" role="group" aria-label="이퀄라이저 모델 선택"></div>
            </div>
            <div class="settings-sec">
                <div class="settings-title">채널</div>
                <button class="skin-btn" type="button" onclick="toggleSettings(false); openListFromSettings();">전체 채널 목록 열기</button>
            </div>
        </div>
    </div>

    <div class="crate-overlay" id="crateOverlay" hidden>
        <div class="crate-panel" role="dialog" aria-modal="true" aria-label="음반 수납장">
            <div class="crate-head">
                <div class="crate-title">음반 수납장 <span class="crate-count" id="crateCount"></span></div>
                <input class="crate-search" id="crateSearch" type="search" placeholder="작곡가·제목·작품 검색" aria-label="음반 검색" autocomplete="off">
                <button class="crate-close" type="button" aria-label="수납장 닫기" onclick="closeCrate()">✕</button>
            </div>
            <div class="crate-grid" id="crateGrid" role="list"></div>
            <div class="crate-empty" id="crateEmpty" hidden>검색 결과가 없습니다.</div>
        </div>
    </div>

    <audio id="audioPlayer" crossorigin="anonymous"></audio>

    <script src="stations.js"></script>
    <script src="player-core.js"></script>
    <script src="store.js"></script>
    <script src="skins.js"></script>
    <script src="engine.js"></script>
    <script src="deck.js"></script>
    <script src="app.js"></script>
    <script>
        // PWA 서비스워커 등록 — 앱 셸 캐싱으로 오프라인 실행/즉시 시작 지원.
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("sw.js").catch((error) => {
                    console.warn("서비스워커 등록 실패:", error);
                });
            });
        }
    </script>
</body>
</html>
