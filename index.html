<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#121110">
    <title>FM 라디오 모음</title>
    <meta name="description" content="KBS, MBC, SBS와 주요 FM 라디오를 한 화면에서 바로 재생하고 녹음, 즐겨찾기, 취침 타이머까지 지원하는 FM 라디오 모음">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%BB%3C/text%3E%3C/svg%3E">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="FM 라디오">

    <script defer src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <style>
        :root {
            --bg: #121110;
            --bg-soft: #1c1917;
            --panel: rgba(30, 27, 24, 0.9);
            --panel-soft: rgba(255, 248, 240, 0.05);
            --line: rgba(255, 244, 232, 0.1);
            --text: #f7f0e7;
            --muted: #b9aea1;
            --accent: #d36a42;
            --accent-strong: #ec8255;
            --rec: #e5484d;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            --radius-lg: 24px;
            --radius-md: 18px;
            --radius-sm: 14px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Pretendard Variable", Pretendard, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            background:
                radial-gradient(circle at top, rgba(211, 106, 66, 0.14), transparent 28%),
                linear-gradient(180deg, #201a16 0%, #131110 30%, #0d0d0d 100%);
            color: var(--text);
            min-height: 100vh;
        }

        button,
        input {
            font: inherit;
        }

        button {
            border: 0;
            background: none;
            color: inherit;
        }

        button:focus-visible,
        input:focus-visible,
        a:focus-visible {
            outline: 2px solid var(--accent-strong);
            outline-offset: 3px;
        }

        .page-shell {
            width: min(1040px, calc(100% - 28px));
            margin: 0 auto;
            padding: 18px 0 40px;
        }

        .site-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 6px 4px 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            color: #fff6ee;
            background: linear-gradient(135deg, var(--accent-strong), #9c492d);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.28), 0 8px 18px rgba(211, 106, 66, 0.22);
            flex-shrink: 0;
        }

        .brand-title {
            font-size: 1.06rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .brand-sub {
            margin-top: 2px;
            color: var(--muted);
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .live-clock,
        .mini-open {
            font-size: 0.92rem;
            font-weight: 600;
            color: #e2d7ca;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: var(--panel-soft);
            flex-shrink: 0;
        }

        .live-clock {
            font-variant-numeric: tabular-nums;
        }

        .mini-open {
            font-size: 0.84rem;
            cursor: pointer;
            transition: background 0.18s ease, border-color 0.18s ease;
        }

        .mini-open:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.16);
        }

        .hero-visual {
            position: relative;
            overflow: hidden;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: var(--shadow);
            background: linear-gradient(180deg, #242019 0%, #16130f 62%, #100e0c 100%);
            margin-bottom: 18px;
            padding: 16px 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tuner-stage {
            position: relative;
            line-height: 0;
        }

        .tuner-svg {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 7px;
            box-shadow:
                0 30px 56px rgba(0, 0, 0, 0.55),
                0 10px 18px rgba(0, 0, 0, 0.5),
                0 2px 4px rgba(0, 0, 0, 0.45),
                0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .vu-canvas {
            display: block;
            width: 100%;
            height: 44px;
            pointer-events: none;
            opacity: 0.9;
        }

        .hero-player-wrap {
            position: static;
        }

        .player-bar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            padding: 12px 14px;
            border-radius: var(--radius-lg);
            background: rgba(23, 20, 18, 0.68);
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(14px);
        }

        .player-main {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .btn-play-main {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            background: radial-gradient(circle at 30% 30%, var(--accent-strong), var(--accent) 62%, #9c492d 100%);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.28),
                0 8px 18px rgba(211, 106, 66, 0.26);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .btn-play-main:hover {
            transform: translateY(-1px);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.3),
                0 15px 28px rgba(211, 106, 66, 0.34);
        }

        .btn-play-main:active {
            transform: scale(0.98);
        }

        .now-label {
            color: #dfb287;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            margin-bottom: 4px;
        }

        .now-station {
            font-size: 1.02rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-subtext {
            margin-top: 3px;
            color: var(--muted);
            font-size: 0.84rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-side {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .btn-rec,
        .btn-timer {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: var(--panel-soft);
            color: #e2d7ca;
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, opacity 0.18s ease;
        }

        .btn-rec:hover:not(:disabled),
        .btn-timer:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.16);
        }

        .btn-rec:disabled {
            opacity: 0.38;
            cursor: not-allowed;
        }

        .btn-timer svg {
            width: 15px;
            height: 15px;
            fill: currentColor;
            flex-shrink: 0;
        }

        .btn-timer #timerLabel {
            font-variant-numeric: tabular-nums;
        }

        .btn-timer.armed {
            border-color: var(--accent-strong);
            color: #f6ead9;
            background: rgba(255, 255, 255, 0.07);
        }

        .rec-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--rec);
            flex-shrink: 0;
        }

        .rec-time {
            font-variant-numeric: tabular-nums;
            min-width: 3ch;
            text-align: left;
        }

        .btn-rec.recording {
            background: rgba(229, 72, 77, 0.16);
            border-color: rgba(229, 72, 77, 0.48);
            color: #ffd9da;
        }

        .btn-rec.recording .rec-dot {
            animation: recPulse 1.4s ease-out infinite;
        }

        @keyframes recPulse {
            0% { box-shadow: 0 0 0 0 rgba(229, 72, 77, 0.55); }
            100% { box-shadow: 0 0 0 9px rgba(229, 72, 77, 0); }
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 999px;
            background: var(--panel-soft);
        }

        .volume-control svg {
            width: 18px;
            height: 18px;
            fill: #e2d7ca;
            flex-shrink: 0;
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 104px;
            height: 4px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent), rgba(255, 255, 255, 0.18));
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: #fff8f0;
            cursor: pointer;
        }

        .volume-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: #fff8f0;
            cursor: pointer;
        }

        main {
            display: grid;
            gap: 16px;
        }

        .group {
            border-radius: var(--radius-lg);
            padding: 20px;
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
        }

        .group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 14px;
        }

        .group-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .group-title::before {
            content: "";
            width: 4px;
            height: 16px;
            border-radius: 999px;
            background: linear-gradient(180deg, var(--accent-strong), var(--accent));
        }

        .group-note {
            color: var(--muted);
            font-size: 0.82rem;
        }

        .station-list {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        }

        .station {
            display: flex;
            align-items: stretch;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid transparent;
            transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
        }

        .station-main {
            flex: 1;
            min-width: 0;
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            align-items: center;
            gap: 14px;
            padding: 13px 4px 13px 14px;
            border-radius: var(--radius-md) 0 0 var(--radius-md);
            text-align: left;
            cursor: pointer;
        }

        .station-fav {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            flex-shrink: 0;
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            color: rgba(255, 255, 255, 0.26);
            cursor: pointer;
            transition: color 0.18s ease;
        }

        .station-fav svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .station-fav:hover,
        .station-fav.faved {
            color: #f0c064;
        }

        .station:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .station.active {
            background: linear-gradient(135deg, rgba(211, 106, 66, 0.15), rgba(255, 255, 255, 0.04));
            border-color: rgba(211, 106, 66, 0.34);
        }

        .station-icon {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff8f2;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            flex-shrink: 0;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .station-name {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #f4eee7;
        }

        .station-desc {
            font-size: 0.88rem;
            color: var(--muted);
            margin-top: 5px;
        }

        .station-status {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            min-width: 28px;
        }

        .station-eq {
            display: none;
            gap: 3px;
            align-items: flex-end;
            height: 18px;
        }

        .station.active .station-eq {
            display: flex;
        }

        .station.active.playing .station-eq .eq-bar {
            animation-play-state: running;
        }

        .eq-bar {
            width: 3px;
            background: var(--accent);
            border-radius: 999px;
            animation: eq 0.8s ease-in-out infinite alternate;
            animation-play-state: paused;
        }

        .eq-bar:nth-child(1) { height: 6px; animation-delay: 0s; }
        .eq-bar:nth-child(2) { height: 14px; animation-delay: 0.18s; }
        .eq-bar:nth-child(3) { height: 8px; animation-delay: 0.36s; }
        .eq-bar:nth-child(4) { height: 16px; animation-delay: 0.12s; }

        @keyframes eq {
            0% { height: 4px; opacity: 0.56; }
            100% { height: 18px; opacity: 1; }
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(211, 106, 66, 0.2);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .station.loading .loading-spinner {
            display: block;
        }

        .station.loading .station-eq {
            display: none !important;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .recording-list {
            display: grid;
            gap: 10px;
        }

        .recording {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            align-items: center;
            gap: 14px;
            padding: 13px 14px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--line);
        }

        .rec-badge {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.68rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            color: #ffd9da;
            background: linear-gradient(135deg, rgba(229, 72, 77, 0.34), rgba(229, 72, 77, 0.12));
            border: 1px solid rgba(229, 72, 77, 0.3);
        }

        .rec-info {
            min-width: 0;
        }

        .rec-name {
            font-size: 0.98rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .rec-meta {
            margin-top: 4px;
            color: var(--muted);
            font-size: 0.82rem;
        }

        .rec-info audio {
            display: block;
            margin-top: 10px;
            width: min(360px, 100%);
            height: 36px;
        }

        .rec-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .rec-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: var(--panel-soft);
            color: #e2d7ca;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.18s ease, border-color 0.18s ease;
        }

        .rec-btn:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.16);
        }

        .rec-btn.danger:hover {
            background: rgba(229, 72, 77, 0.14);
            border-color: rgba(229, 72, 77, 0.4);
            color: #ffd9da;
        }

        .site-footer {
            margin-top: 22px;
            padding: 0 4px;
            color: var(--muted);
            font-size: 0.78rem;
            text-align: center;
        }

        .footer-link {
            color: #dfb287;
            margin-left: 8px;
        }

        .skin-picker {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
            padding: 2px 2px 0;
            flex-wrap: wrap;
        }

        .skin-btn {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--muted);
            background: rgba(255, 248, 240, 0.05);
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 4px 12px;
            cursor: pointer;
        }

        .skin-btn:hover {
            color: var(--text);
            background: rgba(255, 248, 240, 0.1);
        }

        .skin-btn.active {
            color: #ffd9a8;
            border-color: rgba(236, 130, 85, 0.5);
            background: rgba(211, 106, 66, 0.16);
        }

        /* 랙 온리 모드: 플레이어바·VU바·목록 토글은 숨기고 기기 이미지로만 구성 */
        .hero-player-wrap,
        .vu-canvas,
        .list-toggle-wrap,
        .skin-picker {
            display: none !important;
        }

        .settings-panel .skin-picker {
            display: flex !important;
        }

        .settings-overlay {
            position: fixed;
            inset: 0;
            z-index: 60;
            background: rgba(10, 8, 7, 0.66);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .settings-overlay[hidden] {
            display: none !important;
        }

        .settings-panel {
            width: min(560px, 100%);
            max-height: 86vh;
            overflow-y: auto;
            background: #1d1916;
            border: 1px solid var(--line);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 22px 24px 26px;
        }

        .settings-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 1.05rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .settings-close {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: var(--panel-soft);
            border: 1px solid var(--line);
            cursor: pointer;
            font-size: 0.9rem;
        }

        .settings-sec {
            margin-top: 18px;
        }

        .settings-title {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .settings-panel .skin-picker {
            display: flex;
            justify-content: flex-start;
            padding: 0;
        }

        .rack-unit {
            margin-top: 10px;
            line-height: 0;
        }

        .rack-unit svg {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 7px;
            box-shadow:
                0 30px 56px rgba(0, 0, 0, 0.55),
                0 10px 18px rgba(0, 0, 0, 0.5),
                0 2px 4px rgba(0, 0, 0, 0.45),
                0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .list-toggle-wrap {
            display: flex;
            justify-content: center;
            margin: 2px 0 16px;
        }

        .list-toggle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 999px;
            background: var(--panel-soft);
            border: 1px solid var(--line);
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }

        .list-toggle:hover {
            background: rgba(255, 248, 240, 0.08);
        }

        .list-toggle-chevron {
            transition: transform 0.2s ease;
        }

        .list-toggle[aria-expanded="true"] .list-toggle-chevron {
            transform: rotate(180deg);
        }

        #stationMain.collapsed {
            display: none;
        }

        @media (max-width: 720px) {
            .page-shell {
                width: min(100% - 18px, 100%);
                padding-top: 10px;
            }

            .site-header {
                padding-bottom: 12px;
            }

            .brand-sub {
                white-space: normal;
            }

            .live-clock {
                display: none;
            }

            .hero-visual {
                border-radius: 18px;
                padding: 10px;
            }

            .tuner-svg {
                border-radius: 5px;
            }

            .player-bar {

        const SKIN_ORDER = ["t2", "mr78", "m10b", "tu9900"];

        function tsFreqToX(f) {
            const c = tunerCfg.freq;
            return c.x88 + (Math.max(88, Math.min(108, f)) - 88) * c.px;
        }

        function tunerSetStation(station) {
            if (!tsFreq) return;
            const d = tunerCfg.digit;
            if (station) {
                const txt = station.freq.toFixed(1);
                tsFreq.textContent = txt;
                tsFreqGlow.textContent = txt;
                tsFreq.style.fill = d.lit;
                tsFreqGlow.style.fill = d.glow;
                tsDialPtr.setAttribute("transform", "translate(" + (tsFreqToX(station.freq) - tunerCfg.freq.drawX).toFixed(1) + ",0)");
                tunerKnobAngle(station.freq);
                highlightStationMark(station.id);
            } else {
                tsFreq.textContent = "--.-";
                tsFreqGlow.textContent = "--.-";
                tsFreq.style.fill = d.dim;
                tsFreqGlow.style.fill = d.dimGlow;
                tsDialPtr.setAttribute("transform", "translate(" + (tsFreqToX(88) - tunerCfg.freq.drawX).toFixed(1) + ",0)");
                tunerKnobAngle(98);
                highlightStationMark(null);
            }
        }

        function tunerSetLeds() {
            tsPanelState = "";   // 다음 동기화 때 강제 갱신
            tsSyncPanel();
        }

        function tunerKnobAngle(freq) {
            if (!tsKnob) return;
            const ang = (Math.max(88, Math.min(108, freq)) - 88) / 20 * 300 - 150;
            tsKnob.setAttribute("transform", "rotate(" + ang.toFixed(1) + " " + tunerCfg.knob.cx + " " + tunerCfg.knob.cy + ")");
        }

        function highlightStationMark(id) {
            if (!tsStationMarks) return;
            const m = tunerCfg.mark;
            tsStationMarks.querySelectorAll("rect").forEach((el) => {
                const on = el.getAttribute("data-station") === id;
                el.setAttribute("fill", on ? m.colorOn : m.color);
                el.setAttribute("height", on ? m.hOn : m.h);
            });
        }

        function nearestStation(freq) {
            return stations.reduce((a, b) => Math.abs(b.freq - freq) < Math.abs(a.freq - freq) ? b : a);
        }

        function clientXToFreq(clientX) {
            const r = tunerSvgEl.getBoundingClientRect();
            const svgX = (clientX - r.left) / r.width * 2000;
            return 88 + (svgX - tunerCfg.freq.x88) / tunerCfg.freq.px;
        }

        // 드래그 중 미리보기 — 바늘·표시·노브를 임의 주파수로 (선택은 손 뗄 때)
        function tunerPreview(freq) {
            freq = Math.max(88, Math.min(108, freq));
            const d = tunerCfg.digit;
            tsDialPtr.setAttribute("transform", "translate(" + (tsFreqToX(freq) - tunerCfg.freq.drawX).toFixed(1) + ",0)");
            const txt = freq.toFixed(1);
            tsFreq.textContent = txt;
            tsFreqGlow.textContent = txt;
            tsFreq.style.fill = d.lit;
            tsFreqGlow.style.fill = d.glow;
            tunerKnobAngle(freq);
            const near = nearestStation(freq);
            nowStation.textContent = near.name;
            playerSubtext.textContent = near.name + " · " + near.freq.toFixed(1) + "MHz — 손을 떼면 선택됩니다.";
        }

        function tunerLoop(now) {
            tsRaf = requestAnimationFrame(tunerLoop);
            ttFrame(now || performance.now());
            if (!tunerCfg) return;
            let target = 0;
            if (isPlaying) {
                if (analyser) {
                    // 데스크톱/안드로이드(MSE): 실제 오디오 레벨로 신호 세기 구동
                    if (!tsFreqData) tsFreqData = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(tsFreqData);
                    const n = Math.floor(tsFreqData.length * 0.6);
                    let sum = 0;
                    for (let i = 0; i < n; i++) sum += tsFreqData[i];
                    target = Math.min(1, (sum / n / 255) * 1.6 + 0.32);
                } else {
                    // iOS 네이티브 HLS: 오디오 분석 불가 → '수신 양호'를 자연스럽게 시뮬레이션
                    target = 0.78 + Math.sin(performance.now() / 300) * 0.08 + (Math.random() - 0.5) * 0.05;
                }
            }
            tsSignal += (target - tsSignal) * 0.16;
            const sc = tunerCfg.signal;
            const sigX = sc.baseX + Math.max(0, Math.min(1, tsSignal)) * sc.travel;
            tsSignalPtr.setAttribute("transform", "translate(" + (sigX - sc.drawX).toFixed(1) + ",0)");

            const tuneTarget = isPlaying ? 0 : 0.85;
            const jitter = isPlaying ? (Math.random() - 0.5) * 0.05 : 0;
            tsTune += (tuneTarget - tsTune) * 0.1 + jitter;
            tsTune = Math.max(-1, Math.min(1, tsTune));
            tsTunePtr.setAttribute("transform", "translate(" + (tsTune * tunerCfg.tune.travel).toFixed(1) + ",0)");
            tsSyncPanel();
        }

        function applyBlend() {
            // 하이블렌드: 고음을 깎아 약전계 잡음을 줄이는 효과 (MSE 경로에서만 실제 적용)
            if (blendFilter) blendFilter.frequency.value = blendOn ? 5000 : 20000;
        }

        function applyMono() {
            // 모노: 게인 노드 입력을 1채널로 강제해 다운믹스
            if (monoGain) {
                monoGain.channelCount = 1;
                monoGain.channelCountMode = monoOn ? "explicit" : "max";
            }
        }

        function tsSyncPanel() {
            if (!tunerCfg || !tsFreq) return;
            const recOn = !!recorder;
            const timerOn = sleepIndex > 0;
            const listOpen = !document.getElementById("stationMain").classList.contains("collapsed");
            const state = [isPlaying, !!currentStation, recOn, blendOn, monoOn, audio.muted, timerOn, listOpen].join(",");
            if (state === tsPanelState) return;
            tsPanelState = state;

            // POWER: T-2 로커는 상/하 색 반전, 그 외 스킨은 액추에이터 이동
            const pwrTop = document.getElementById("tsPwrTop");
            const pwrBot = document.getElementById("tsPwrBot");
            if (pwrTop && pwrBot) {
                pwrTop.setAttribute("fill", isPlaying ? "#54525a" : "#1c1a20");
                pwrBot.setAttribute("fill", isPlaying ? "#1c1a20" : "#54525a");
            }
            const setSw = (id, down) => {
                const el = document.getElementById(id);
                if (el) el.setAttribute("transform", down ? "translate(0," + tunerCfg.swTravel + ")" : "translate(0,0)");
            };
            setSw("tsSwPwr", isPlaying);
            setSw("tsSwRec", recOn);
            setSw("tsSwBlend", blendOn);
            setSw("tsSwMode", monoOn);
            setSw("tsSwMute", audio.muted);
            setSw("tsSwIf", timerOn);
            setSw("tsSwRf", listOpen);

            const setLed = (id, on) => {
                const el = document.getElementById(id);
                if (!el) return;
                el.style.fill = on
                    ? (el.getAttribute("data-on") || tunerCfg.led.on)
                    : (el.getAttribute("data-off") || tunerCfg.led.off);
            };
            const tunerLive = isPlaying && !!currentStation;   // 포노 재생 중엔 튜너 LED 소등
            setLed("tsLedStereo", tunerLive && !monoOn);
            setLed("tsLedLock", tunerLive);
            setLed("tsLedBlend", blendOn);
        }

        // ----- 조작 바인딩 (스킨 마운트마다 다시 연결) -----
        function bindTunerControls() {
            const dial = document.getElementById("tsDialHit");
            let dialDrag = false;
            dial.addEventListener("pointerdown", (e) => {
                dialDrag = true;
                try { dial.setPointerCapture(e.pointerId); } catch (err) {}
                tunerPreview(clientXToFreq(e.clientX));
                e.preventDefault();
            });
            dial.addEventListener("pointermove", (e) => { if (dialDrag) tunerPreview(clientXToFreq(e.clientX)); });
            dial.addEventListener("pointerup", (e) => {
                if (!dialDrag) return;
                dialDrag = false;
                selectStation(nearestStation(clientXToFreq(e.clientX)).id);
            });
            dial.addEventListener("pointercancel", () => { dialDrag = false; });

            const knob = document.getElementById("tsKnobHit");
            let knobDrag = false, knobMoved = false, knobStartX = 0, knobStartFreq = 98;
            knob.addEventListener("pointerdown", (e) => {
                knobDrag = true;
                knobMoved = false;
                knobStartX = e.clientX;
                knobStartFreq = currentStation ? currentStation.freq : 98;
                try { knob.setPointerCapture(e.pointerId); } catch (err) {}
                e.preventDefault();
            });
            knob.addEventListener("pointermove", (e) => {
                if (!knobDrag) return;
                const dx = e.clientX - knobStartX;
                if (Math.abs(dx) > 3) knobMoved = true;
                tunerPreview(knobStartFreq + dx / 14);
            });
            knob.addEventListener("pointerup", (e) => {
                if (!knobDrag) return;
                knobDrag = false;
                if (knobMoved) {
                    selectStation(nearestStation(Math.max(88, Math.min(108, knobStartFreq + (e.clientX - knobStartX) / 14))).id);
                } else {
                    playEasterEgg();
                }
            });
            knob.addEventListener("pointercancel", () => { knobDrag = false; });

            const on = (id, fn) => document.getElementById(id).addEventListener("click", fn);
            on("tsPowerHit", () => { if (currentStation) togglePlay(); });
            on("tsRecHit", () => {
                if (recorder || (currentStation && isPlaying)) {
                    toggleRecording();
                } else {
                    playerSubtext.textContent = "녹음은 재생 중에만 시작할 수 있습니다.";
                }
            });
            on("tsBlendHit", () => {
                blendOn = !blendOn;
                applyBlend();
                playerSubtext.textContent = blendOn ? "하이블렌드 ON — 고음 잡음을 줄입니다." : "하이블렌드 OFF";
            });
            on("tsModeHit", () => {
                monoOn = !monoOn;
                applyMono();
                playerSubtext.textContent = monoOn ? "모노 수신 모드" : "스테레오 수신 모드";
            });
            on("tsMuteHit", () => {
                audio.muted = !audio.muted;
                playerSubtext.textContent = audio.muted ? "음소거되었습니다." : "음소거를 해제했습니다.";
            });
            on("tsIfHit", () => cycleSleepTimer());
            on("tsRfHit", () => toggleStationList());
        }

        function initTunerSkin(id) {
            if (!TUNER_SKINS[id]) id = "t2";
            tunerSkinId = id;
            const skin = TUNER_SKINS[id];
            tunerCfg = skin.cfg;

            const stage = document.getElementById("tunerStage");
            stage.innerHTML = skin.svg;
            tunerSvgEl = stage.querySelector("svg");
            tsFreq = document.getElementById("tsFreq");
            tsFreqGlow = document.getElementById("tsFreqGlow");
            tsDialPtr = document.getElementById("tsDialPtr");
            tsSignalPtr = document.getElementById("tsSignalPtr");
            tsTunePtr = document.getElementById("tsTunePtr");
            tsKnob = document.getElementById("tsKnob");
            tsStationMarks = document.getElementById("tsStationMarks");

            // 히트 영역 생성 (cfg 좌표 기반, 투명)
            Object.keys(TS_HIT_META).forEach((key) => {
                const box = tunerCfg.hits[key];
                if (!box) return;
                const meta = TS_HIT_META[key];
                const r = document.createElementNS(SVG_NS, "rect");
                r.setAttribute("id", "ts" + key.charAt(0).toUpperCase() + key.slice(1) + "Hit");
                r.setAttribute("x", box[0]); r.setAttribute("y", box[1]);
                r.setAttribute("width", box[2]); r.setAttribute("height", box[3]);
                r.setAttribute("fill", "#000"); r.setAttribute("fill-opacity", "0");
                r.setAttribute("style", "cursor:" + meta.cursor + ";touch-action:none");
                const t = document.createElementNS(SVG_NS, "title");
                t.textContent = meta.title;
                r.appendChild(t);
                tunerSvgEl.appendChild(r);
            });
            const kb = tunerCfg.hits.knob;
            const kc = document.createElementNS(SVG_NS, "circle");
            kc.setAttribute("id", "tsKnobHit");
            kc.setAttribute("cx", kb[0]); kc.setAttribute("cy", kb[1]); kc.setAttribute("r", kb[2]);
            kc.setAttribute("fill", "#000"); kc.setAttribute("fill-opacity", "0");
            kc.setAttribute("style", "cursor:grab;touch-action:none");
            const kt = document.createElementNS(SVG_NS, "title");
            kt.textContent = "노브를 좌우로 드래그해 튜닝하세요";
            kc.appendChild(kt);
            tunerSvgEl.appendChild(kc);

            // 방송국 마커 생성
            const m = tunerCfg.mark;
            stations.forEach((st) => {
                const mark = document.createElementNS(SVG_NS, "rect");
                mark.setAttribute("x", (tsFreqToX(st.freq) - 1.5).toFixed(1));
                mark.setAttribute("y", m.y);
                mark.setAttribute("width", "3");
                mark.setAttribute("height", m.h);
                mark.setAttribute("rx", "1");
                mark.setAttribute("fill", m.color);
                mark.setAttribute("data-station", st.id);
                tsStationMarks.appendChild(mark);
            });

            applyPanelLighting(tunerSvgEl);
            bindTunerControls();
            tsPanelState = "";
            tsSignal = 0;
            tsTune = 0.85;
            tunerSetStation(currentStation);
            tsSyncPanel();
            saveJson("fmRadio.skin", id);
            renderSkinPicker();
        }

        function renderSkinPicker() {
            const el = document.getElementById("skinPicker");
            el.innerHTML = "";
            SKIN_ORDER.forEach((id) => {
                const b = document.createElement("button");
                b.type = "button";
                b.className = "skin-btn" + (id === tunerSkinId ? " active" : "");
                b.textContent = TUNER_SKINS[id].label;
                b.addEventListener("click", () => { if (id !== tunerSkinId) initTunerSkin(id); });
                el.appendChild(b);
            });
        }

        // ===================================================================
        // 하이파이 랙: 이퀄라이저 · 앰프 · 턴테이블
        // ===================================================================

        // ----- 그래픽 이퀄라이저 (YAHAMA GE-5) -----
        const EQ_FREQS = [60, 250, 1000, 4000, 12000];
        const EQ_LABELS = ["60", "250", "1k", "4k", "12k"];
        const EQ_X = [800, 1030, 1260, 1490, 1720];
        const EQ_TOP = 100;
        const EQ_BOT = 320;
        const EQ_VB_H = 400;
        let eqState = loadJson("fmRadio.eq", { on: true, gains: [0, 0, 0, 0, 0] });
        if (!Array.isArray(eqState.gains) || eqState.gains.length !== 5) eqState = { on: true, gains: [0, 0, 0, 0, 0] };

        function applyEq() {
            if (!eqNodes) return;
            eqNodes.forEach((b, i) => { b.gain.value = eqState.on ? eqState.gains[i] : 0; });
        }

        function eqGainToY(g) {
            return EQ_TOP + (12 - g) / 24 * (EQ_BOT - EQ_TOP);
        }

        function mountEq() {
            // 필드 배경: dB 그리드 라인
            let grid = "";
            [-12, -9, -6, -3, 0, 3, 6, 9, 12].forEach((g) => {
                const y = eqGainToY(g);
                grid += '<line x1="700" y1="' + y + '" x2="1900" y2="' + y + '" stroke="#3a3a40" stroke-width="' + (g === 0 ? 2 : 0.8) + '" opacity="' + (g === 0 ? 0.9 : 0.5) + '"/>';
            });
            const sliders = EQ_FREQS.map((f, i) => {
                const x = EQ_X[i];
                return '<rect x="' + (x - 5) + '" y="' + (EQ_TOP - 8) + '" width="10" height="' + (EQ_BOT - EQ_TOP + 16) + '" rx="5" fill="#050506" stroke="#2e2e34" stroke-width="1.2"/>' +
                    '<g id="eqH' + i + '">' +
                    '<rect x="' + (x - 30) + '" y="-15" width="60" height="30" rx="4" fill="#26262c" stroke="#0a0a0c" stroke-width="1.5"/>' +
                    '<rect x="' + (x - 30) + '" y="-15" width="60" height="6" rx="3" fill="#3c3c44"/>' +
                    '<rect x="' + (x - 30) + '" y="-2.5" width="60" height="5" fill="#f2f2f4"/>' +
                    '</g>' +
                    '<text id="eqV' + i + '" x="' + x + '" y="78" font-family="Arial" font-size="14" font-weight="700" fill="#9a9aa2" text-anchor="middle">0</text>' +
                    '<text x="' + x + '" y="354" font-family="Arial" font-size="15" font-weight="600" letter-spacing="1" fill="#8a8a94" text-anchor="middle">' + EQ_LABELS[i] + '</text>' +
                    '<rect id="eqHit' + i + '" x="' + (x - 58) + '" y="66" width="116" height="300" fill="#000" fill-opacity="0" style="cursor:ns-resize;touch-action:none"><title>' + EQ_LABELS[i] + 'Hz &#177;12dB</title></rect>';
            }).join("");
            let lvl = "";
            for (let i = 0; i < 12; i++) {
                lvl += '<rect id="eqLvl' + i + '" x="530" y="' + (300 - i * 19) + '" width="46" height="12" rx="2" fill="#33251a"/>';
            }
            document.getElementById("eqStage").innerHTML =
                '<svg class="eq-svg" viewBox="0 0 2000 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="YAHAMA GE-5 스테레오 그래픽 이퀄라이저">' +
                '<defs>' +
                '<linearGradient id="eqPanel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1b1b1f"/><stop offset="0.5" stop-color="#121215"/><stop offset="1" stop-color="#0b0b0d"/></linearGradient>' +
                '<pattern id="eqRidge" width="14" height="8" patternUnits="userSpaceOnUse"><rect width="7" height="8" fill="#0e0e11"/><rect x="7" width="7" height="8" fill="#141419"/></pattern>' +
                '</defs>' +
                '<rect width="2000" height="400" rx="8" fill="url(#eqPanel)"/>' +
                '<rect width="2000" height="6" fill="#ffffff" opacity="0.06"/>' +
                '<rect y="388" width="2000" height="12" fill="#000" opacity="0.4"/>' +
                // 랙 이어
                '<rect x="0" y="0" width="44" height="400" rx="8" fill="#101013"/><circle cx="22" cy="52" r="9" fill="#26262c" stroke="#3c3c44"/><circle cx="22" cy="348" r="9" fill="#26262c" stroke="#3c3c44"/>' +
                '<rect x="1956" y="0" width="44" height="400" rx="8" fill="#101013"/><circle cx="1978" cy="52" r="9" fill="#26262c" stroke="#3c3c44"/><circle cx="1978" cy="348" r="9" fill="#26262c" stroke="#3c3c44"/>' +
                // 좌측 컨트롤 블록
                '<text x="90" y="96" font-family="Arial" font-size="30" font-weight="700" letter-spacing="1.5" fill="#f0f0f2">YAHAMA</text>' +
                '<text x="90" y="126" font-family="Arial" font-size="14" letter-spacing="1.5" fill="#8a8a94">Stereo Graphic Equalizer GE-5</text>' +
                '<text x="92" y="196" font-family="Arial" font-size="11" letter-spacing="1" fill="#8a8a94">power</text>' +
                '<rect x="90" y="206" width="34" height="64" rx="3" fill="#e8e8ec" stroke="#0a0a0c" stroke-width="1.5"/>' +
                '<text x="92" y="304" font-family="Arial" font-size="11" letter-spacing="1" fill="#8a8a94">tape monitor</text>' +
                '<rect x="90" y="314" width="34" height="40" rx="3" fill="#3c3c44" stroke="#0a0a0c"/>' +
                '<circle id="eqLed" cx="206" cy="216" r="6" fill="#3a2012"/>' +
                '<text x="222" y="221" font-family="Arial" font-size="11" letter-spacing="1" fill="#8a8a94">EQ on</text>' +
                '<rect id="eqDefeatBtn" x="200" y="234" width="96" height="44" rx="4" fill="#26262c" stroke="#3c3c44" style="cursor:pointer"><title>EQ 켜기/끄기 (DEFEAT)</title></rect>' +
                '<rect x="206" y="240" width="84" height="10" rx="2" fill="#3c3c44" pointer-events="none"/>' +
                '<text x="248" y="268" font-family="Arial" font-size="13" font-weight="700" letter-spacing="1.5" fill="#d8d8dc" text-anchor="middle" pointer-events="none">DEFEAT</text>' +
                // 레벨 LED 컬럼
                '<text x="553" y="78" font-family="Arial" font-size="11" letter-spacing="1.5" fill="#8a8a94" text-anchor="middle">level</text>' +
                '<text x="512" y="98" font-family="Arial" font-size="10" fill="#5a5a62" text-anchor="end">+dB</text>' +
                '<text x="512" y="310" font-family="Arial" font-size="10" fill="#5a5a62" text-anchor="end">-dB</text>' +
                lvl +
                // 슬라이더 필드
                '<rect x="680" y="60" width="1240" height="310" rx="6" fill="url(#eqRidge)" stroke="#26262c" stroke-width="1.5"/>' +
                grid +
                '<text x="694" y="' + (EQ_TOP + 5) + '" font-family="Arial" font-size="12" fill="#8a8a94">+12</text>' +
                '<text x="694" y="' + (eqGainToY(0) + 4) + '" font-family="Arial" font-size="12" fill="#8a8a94">0</text>' +
                '<text x="694" y="' + (EQ_BOT + 5) + '" font-family="Arial" font-size="12" fill="#8a8a94">-12</text>' +
                sliders +
                '<text x="1900" y="354" font-family="Arial" font-size="12" letter-spacing="1" fill="#5a5a62" text-anchor="end">Hz</text>' +
                '</svg>';

            const svg = document.querySelector("#eqStage svg");
            applyPanelLighting(svg);
            EQ_FREQS.forEach((f, i) => {
                const hit = document.getElementById("eqHit" + i);
                let drag = false;
                const setFromY = (clientY) => {
                    const r = svg.getBoundingClientRect();
                    const y = (clientY - r.top) / r.height * EQ_VB_H;
                    let g = 12 - (y - EQ_TOP) / (EQ_BOT - EQ_TOP) * 24;
                    g = Math.max(-12, Math.min(12, g));
                    if (Math.abs(g) < 0.7) g = 0;      // 센터 디텐트
                    eqState.gains[i] = Math.round(g * 2) / 2;
                    applyEq();
                    updateEqVisuals();
                };
                hit.addEventListener("pointerdown", (e) => { drag = true; try { hit.setPointerCapture(e.pointerId); } catch (err) {} setFromY(e.clientY); e.preventDefault(); });
                hit.addEventListener("pointermove", (e) => { if (drag) setFromY(e.clientY); });
                hit.addEventListener("pointerup", () => { drag = false; saveJson("fmRadio.eq", eqState); });
                hit.addEventListener("pointercancel", () => { drag = false; });
            });
            document.getElementById("eqDefeatBtn").addEventListener("click", () => {
                eqState.on = !eqState.on;
                applyEq();
                updateEqVisuals();
                saveJson("fmRadio.eq", eqState);
                playerSubtext.textContent = eqState.on ? "이퀄라이저 ON" : "이퀄라이저 DEFEAT (바이패스)";
            });
            updateEqVisuals();
        }

        function updateEqVisuals() {
            EQ_FREQS.forEach((f, i) => {
                const h = document.getElementById("eqH" + i);
                const v = document.getElementById("eqV" + i);
                if (!h) return;
                h.setAttribute("transform", "translate(0," + eqGainToY(eqState.gains[i]).toFixed(1) + ")");
                h.style.opacity = eqState.on ? 1 : 0.4;
                v.textContent = (eqState.gains[i] > 0 ? "+" : "") + eqState.gains[i];
            });
            const led = document.getElementById("eqLed");
            if (led) led.style.fill = eqState.on ? "#ff7a3a" : "#3a2012";
        }

        function tubeCurve(k, asym) {
            const n = 1024;
            const c = new Float32Array(n);
            const norm = Math.tanh(k);
            for (let i = 0; i < n; i++) {
                const x = i / (n - 1) * 2 - 1;
                const shifted = x + asym * (1 - x * x);   // 비대칭 → 짝수 배음
                c[i] = Math.tanh(k * shifted) / norm;
            }
            return c;
        }

            ampMid.Q.value = m.mid[2];
            ampTreble.frequency.value = m.treble[0];

        function playPhonoTrack(i) {

            isPlaying = true;

        function stopPhono() {

        function updatePhonoVisuals() {

        function needleThump() {
            if (!audioCtx) return;
            try {
                const dur = 0.22;
                const sr = audioCtx.sampleRate;
                const buf = audioCtx.createBuffer(1, Math.floor(sr * dur), sr);
                const d = buf.getChannelData(0);
                for (let i = 0; i < d.length; i++) {
                    const t = i / sr;
                    d[i] = (Math.random() * 2 - 1) * Math.exp(-t * 28) * 0.6 + Math.sin(2 * Math.PI * 38 * t) * Math.exp(-t * 18) * 0.5;
                }
                const s = audioCtx.createBufferSource();
                s.buffer = buf;
                const g = audioCtx.createGain();
                g.gain.value = 0.22;
                s.connect(g);
                g.connect(eqNodes ? eqNodes[0] : audioCtx.destination);
                s.start();
            } catch (e) {}
        }

        function ensureCrackle() {
            if (!audioCtx || !crackleGain || crackleSrc) return;
            try {
                const dur = 3;
                const sr = audioCtx.sampleRate;
                const buf = audioCtx.createBuffer(1, sr * dur, sr);
                const d = buf.getChannelData(0);
                let dust = 0;
                for (let i = 0; i < d.length; i++) {
                    let v = (Math.random() * 2 - 1) * 0.012;      // 표면 노이즈
                    if (Math.random() < 0.00012) dust = 0.25 + Math.random() * 0.75;  // 먼지 팝
                    if (dust > 0.001) { v += (Math.random() * 2 - 1) * dust; dust *= 0.72; }
                    d[i] = v;
                }
                crackleSrc = audioCtx.createBufferSource();
                crackleSrc.buffer = buf;
                crackleSrc.loop = true;
                crackleSrc.connect(crackleGain);
                crackleSrc.start();
            } catch (e) { crackleSrc = null; }
        }

        // ----- 랙 프레임 루프 (플래터 회전·톤암·와우플러터·크랙클·진공관 글로우·VU) -----
        function ttFrame(now) {
            const dt = Math.min(0.05, ttLastTs ? (now - ttLastTs) / 1000 : 0.016);
            ttLastTs = now;

            const rpm = ttRpm45 ? 45 : 100 / 3;
            const spinTarget = (phonoActive && isPlaying) ? 1 : 0;
            const step = spinTarget > ttSpin ? dt / 1.4 : dt / 2.6;   // 스핀업은 빠르게, 런다운은 관성으로
            ttSpin = Math.max(0, Math.min(1, ttSpin + (spinTarget > ttSpin ? 1 : -1) * step));
            if (ttSpin > 0.002) {
                ttAngle = (ttAngle + rpm / 60 * 360 * ttSpin * dt) % 360;
                const g = document.getElementById("ttSpinG");
                if (g) g.setAttribute("transform", "rotate(" + ttAngle.toFixed(2) + " 560 330)");
            }

            // 톤암: 정지 시 암레스트, 재생 시 트랙 진행에 따라 안쪽으로
            let armTarget = -26;
            if (phonoActive && phonoTrack >= 0) {
                const p = (audio.duration > 0 && isFinite(audio.duration)) ? Math.min(1, audio.currentTime / audio.duration) : 0;
                const seg = 21 / RECORD.tracks.length;
                armTarget = -2 + seg * (phonoTrack + p);
            }
            ttArmAng += (armTarget - ttArmAng) * Math.min(1, dt * 3.5);
            const arm = document.getElementById("ttArmG");
            if (arm) arm.setAttribute("transform", "rotate(" + ttArmAng.toFixed(2) + " 1065 120)");

            // 와우·플러터 + 스핀업 피치 + 45회전
            if (phonoActive && isPlaying) {
                const t = now / 1000;
                const wow = 1 + 0.0022 * Math.sin(t * 2 * Math.PI * 0.43) + 0.0007 * Math.sin(t * 2 * Math.PI * 3.1);
                const spinPitch = ttSpin < 0.999 ? (0.5 + 0.5 * ttSpin) : 1;
                const mult = ttRpm45 ? 1.35 : 1;
                try { audio.playbackRate = wow * spinPitch * mult; } catch (e) {}
            }
            if (phonoActive && crackleGain) {
                ensureCrackle();
                const target = (isPlaying && !audio.muted) ? 0.013 : 0;
                crackleGain.gain.value += (target - crackleGain.gain.value) * 0.08;
            }

            // 앰프: 진공관 글로우·VU 바늘·전원 LED
            document.querySelectorAll(".ampGlow").forEach((el) => {
                el.style.opacity = isPlaying ? (0.3 + tsSignal * 0.55) : 0.06;
            });
            const vuAng = -42 + Math.max(0, Math.min(1, tsSignal)) * 84;
            ["ampVuL", "ampVuR"].forEach((id, idx) => {
                const n = document.getElementById(id);
                if (n) n.setAttribute("transform", "rotate(" + (vuAng * (idx ? 0.96 : 1)).toFixed(1) + " " + n.getAttribute("data-cx") + " " + n.getAttribute("data-cy") + ")");
            });
            const pled = document.getElementById("ampPwrLed");
            if (pled) pled.style.fill = isPlaying ? "#ff7a3a" : "#3a2012";

            // EQ 레벨 LED 컬럼
            for (let i = 0; i < 12; i++) {
                const el = document.getElementById("eqLvl" + i);
                if (!el) break;
                const on = eqState.on && isPlaying && (i / 12) < tsSignal;
                el.style.fill = on ? (i >= 10 ? "#ff5a3a" : "#ffb03a") : "#33251a";
            }

            // 다이얼 백라이트 (재생 시 램프가 밝아진다)
            document.querySelectorAll(".lampGlow").forEach((el) => {
                el.style.opacity = isPlaying ? 0.95 : 0.4;
            });
        }

        // 채널 목록 접기/펼치기 (기본 접힘 — 튜너 중심)

        function toggleSettings(show) {

        let currentStation = null;
