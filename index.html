<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#121110">
    <title>FM 라디오 모음</title>
    <meta name="description" content="KBS, MBC, SBS와 주요 FM 라디오를 한 화면에서 바로 재생하고 녹음, 즐겨찾기, 취침 타이머까지 지원하는 FM 라디오 모음">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%BB%3C/text%3E%3C/svg%3E">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="FM 라디오">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-S8GLTG1KYZ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-S8GLTG1KYZ');
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <style>
        :root {
            --bg: #121110;
            --bg-soft: #1c1917;
            --panel: rgba(30, 27, 24, 0.9);
            --panel-soft: rgba(255, 248, 240, 0.05);
            --line: rgba(255, 244, 232, 0.1);
            --text: #f7f0e7;
            --muted: #b9aea1;
            --accent: #d36a42;
            --accent-strong: #ec8255;
            --rec: #e5484d;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            --radius-lg: 24px;
            --radius-md: 18px;
            --radius-sm: 14px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Pretendard Variable", Pretendard, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            background:
                radial-gradient(circle at top, rgba(211, 106, 66, 0.14), transparent 28%),
                linear-gradient(180deg, #201a16 0%, #131110 30%, #0d0d0d 100%);
            color: var(--text);
            min-height: 100vh;
        }

        button,
        input {
            font: inherit;
        }

        button {
            border: 0;
            background: none;
            color: inherit;
        }

        button:focus-visible,
        input:focus-visible,
        a:focus-visible {
            outline: 2px solid var(--accent-strong);
            outline-offset: 3px;
        }

        .page-shell {
            width: min(1040px, calc(100% - 28px));
            margin: 0 auto;
            padding: 18px 0 40px;
        }

        .site-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 6px 4px 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            color: #fff6ee;
            background: linear-gradient(135deg, var(--accent-strong), #9c492d);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.28), 0 8px 18px rgba(211, 106, 66, 0.22);
            flex-shrink: 0;
        }

        .brand-title {
            font-size: 1.06rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .brand-sub {
            margin-top: 2px;
            color: var(--muted);
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .live-clock,
        .mini-open {
            font-size: 0.92rem;
            font-weight: 600;
            color: #e2d7ca;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: var(--panel-soft);
            flex-shrink: 0;
        }

        .live-clock {
            font-variant-numeric: tabular-nums;
        }

        .mini-open {
            font-size: 0.84rem;
            cursor: pointer;
            transition: background 0.18s ease, border-color 0.18s ease;
        }

        .mini-open:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.16);
        }

        .hero-visual {
            position: relative;
            overflow: hidden;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: var(--shadow);
            background: linear-gradient(180deg, #242019 0%, #16130f 62%, #100e0c 100%);
            margin-bottom: 18px;
            padding: 16px 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tuner-stage {
            position: relative;
            line-height: 0;
        }

        .tuner-svg {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 7px;
            box-shadow: 0 10px 26px rgba(0, 0, 0, 0.45), 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        .vu-canvas {
            display: block;
            width: 100%;
            height: 44px;
            pointer-events: none;
            opacity: 0.9;
        }

        .hero-player-wrap {
            position: static;
        }

        .player-bar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            padding: 12px 14px;
            border-radius: var(--radius-lg);
            background: rgba(23, 20, 18, 0.68);
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(14px);
        }

        .player-main {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .btn-play-main {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            background: radial-gradient(circle at 30% 30%, var(--accent-strong), var(--accent) 62%, #9c492d 100%);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.28),
                0 8px 18px rgba(211, 106, 66, 0.26);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .btn-play-main:hover {
            transform: translateY(-1px);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.3),
                0 15px 28px rgba(211, 106, 66, 0.34);
        }

        .btn-play-main:active {
            transform: scale(0.98);
        }

        .now-label {
            color: #dfb287;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            margin-bottom: 4px;
        }

        .now-station {
            font-size: 1.02rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-subtext {
            margin-top: 3px;
            color: var(--muted);
            font-size: 0.84rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-side {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .btn-rec,
        .btn-timer {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: var(--panel-soft);
            color: #e2d7ca;
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, opacity 0.18s ease;
        }

        .btn-rec:hover:not(:disabled),
        .btn-timer:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.16);
        }

        .btn-rec:disabled {
            opacity: 0.38;
            cursor: not-allowed;
        }

        .btn-timer svg {
            width: 15px;
            height: 15px;
            fill: currentColor;
            flex-shrink: 0;
        }

        .btn-timer #timerLabel {
            font-variant-numeric: tabular-nums;
        }

        .btn-timer.armed {
            border-color: var(--accent-strong);
            color: #f6ead9;
            background: rgba(255, 255, 255, 0.07);
        }

        .rec-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--rec);
            flex-shrink: 0;
        }

        .rec-time {
            font-variant-numeric: tabular-nums;
            min-width: 3ch;
            text-align: left;
        }

        .btn-rec.recording {
            background: rgba(229, 72, 77, 0.16);
            border-color: rgba(229, 72, 77, 0.48);
            color: #ffd9da;
        }

        .btn-rec.recording .rec-dot {
            animation: recPulse 1.4s ease-out infinite;
        }

        @keyframes recPulse {
            0% { box-shadow: 0 0 0 0 rgba(229, 72, 77, 0.55); }
            100% { box-shadow: 0 0 0 9px rgba(229, 72, 77, 0); }
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 999px;
            background: var(--panel-soft);
        }

        .volume-control svg {
            width: 18px;
            height: 18px;
            fill: #e2d7ca;
            flex-shrink: 0;
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 104px;
            height: 4px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent), rgba(255, 255, 255, 0.18));
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: #fff8f0;
            cursor: pointer;
        }

        .volume-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: #fff8f0;
            cursor: pointer;
        }

        main {
            display: grid;
            gap: 16px;
        }

        .group {
            border-radius: var(--radius-lg);
            padding: 20px;
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
        }

        .group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 14px;
        }

        .group-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .group-title::before {
            content: "";
            width: 4px;
            height: 16px;
            border-radius: 999px;
            background: linear-gradient(180deg, var(--accent-strong), var(--accent));
        }

        .group-note {
            color: var(--muted);
            font-size: 0.82rem;
        }

        .station-list {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        }

        .station {
            display: flex;
            align-items: stretch;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid transparent;
            transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
        }

        .station-main {
            flex: 1;
            min-width: 0;
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            align-items: center;
            gap: 14px;
            padding: 13px 4px 13px 14px;
            border-radius: var(--radius-md) 0 0 var(--radius-md);
            text-align: left;
            cursor: pointer;
        }

        .station-fav {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            flex-shrink: 0;
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            color: rgba(255, 255, 255, 0.26);
            cursor: pointer;
            transition: color 0.18s ease;
        }

        .station-fav svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .station-fav:hover,
        .station-fav.faved {
            color: #f0c064;
        }

        .station:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .station.active {
            background: linear-gradient(135deg, rgba(211, 106, 66, 0.15), rgba(255, 255, 255, 0.04));
            border-color: rgba(211, 106, 66, 0.34);
        }

        .station-icon {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff8f2;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            flex-shrink: 0;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .station-name {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #f4eee7;
        }

        .station-desc {
            font-size: 0.88rem;
            color: var(--muted);
            margin-top: 5px;
        }

        .station-status {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            min-width: 28px;
        }

        .station-eq {
            display: none;
            gap: 3px;
            align-items: flex-end;
            height: 18px;
        }

        .station.active .station-eq {
            display: flex;
        }

        .station.active.playing .station-eq .eq-bar {
            animation-play-state: running;
        }

        .eq-bar {
            width: 3px;
            background: var(--accent);
            border-radius: 999px;
            animation: eq 0.8s ease-in-out infinite alternate;
            animation-play-state: paused;
        }

        .eq-bar:nth-child(1) { height: 6px; animation-delay: 0s; }
        .eq-bar:nth-child(2) { height: 14px; animation-delay: 0.18s; }
        .eq-bar:nth-child(3) { height: 8px; animation-delay: 0.36s; }
        .eq-bar:nth-child(4) { height: 16px; animation-delay: 0.12s; }

        @keyframes eq {
            0% { height: 4px; opacity: 0.56; }
            100% { height: 18px; opacity: 1; }
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(211, 106, 66, 0.2);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .station.loading .loading-spinner {
            display: block;
        }

        .station.loading .station-eq {
            display: none !important;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .recording-list {
            display: grid;
            gap: 10px;
        }

        .recording {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            align-items: center;
            gap: 14px;
            padding: 13px 14px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--line);
        }

        .rec-badge {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.68rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            color: #ffd9da;
            background: linear-gradient(135deg, rgba(229, 72, 77, 0.34), rgba(229, 72, 77, 0.12));
            border: 1px solid rgba(229, 72, 77, 0.3);
        }

        .rec-info {
            min-width: 0;
        }

        .rec-name {
            font-size: 0.98rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .rec-meta {
            margin-top: 4px;
            color: var(--muted);
            font-size: 0.82rem;
        }

        .rec-info audio {
            display: block;
            margin-top: 10px;
            width: min(360px, 100%);
            height: 36px;
        }

        .rec-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .rec-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: var(--panel-soft);
            color: #e2d7ca;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.18s ease, border-color 0.18s ease;
        }

        .rec-btn:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.16);
        }

        .rec-btn.danger:hover {
            background: rgba(229, 72, 77, 0.14);
            border-color: rgba(229, 72, 77, 0.4);
            color: #ffd9da;
        }

        .site-footer {
            margin-top: 22px;
            padding: 0 4px;
            color: var(--muted);
            font-size: 0.78rem;
            text-align: center;
        }

        .footer-link {
            color: #dfb287;
            margin-left: 8px;
        }

        .skin-picker {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
            padding: 2px 2px 0;
            flex-wrap: wrap;
        }

        .skin-btn {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--muted);
            background: rgba(255, 248, 240, 0.05);
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 4px 12px;
            cursor: pointer;
        }

        .skin-btn:hover {
            color: var(--text);
            background: rgba(255, 248, 240, 0.1);
        }

        .skin-btn.active {
            color: #ffd9a8;
            border-color: rgba(236, 130, 85, 0.5);
            background: rgba(211, 106, 66, 0.16);
        }

        .rack-unit {
            margin-top: 10px;
            line-height: 0;
        }

        .rack-unit svg {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 7px;
            box-shadow: 0 10px 26px rgba(0, 0, 0, 0.45), 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        .list-toggle-wrap {
            display: flex;
            justify-content: center;
            margin: 2px 0 16px;
        }

        .list-toggle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 999px;
            background: var(--panel-soft);
            border: 1px solid var(--line);
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }

        .list-toggle:hover {
            background: rgba(255, 248, 240, 0.08);
        }

        .list-toggle-chevron {
            transition: transform 0.2s ease;
        }

        .list-toggle[aria-expanded="true"] .list-toggle-chevron {
            transform: rotate(180deg);
        }

        #stationMain.collapsed {
            display: none;
        }

        @media (max-width: 720px) {
            .page-shell {
                width: min(100% - 18px, 100%);
                padding-top: 10px;
            }

            .site-header {
                padding-bottom: 12px;
            }

            .brand-sub {
                white-space: normal;
            }

            .live-clock {
                display: none;
            }

            .hero-visual {
                border-radius: 18px;
                padding: 10px;
            }

            .tuner-svg {
                border-radius: 5px;
            }

            .player-bar {
                grid-template-columns: 1fr;
                align-items: stretch;
                gap: 10px;
                padding: 12px;
            }

            .player-subtext {
                white-space: normal;
            }

            .player-side {
                flex-wrap: wrap;
                justify-content: space-between;
            }

            .btn-rec,
            .btn-timer {
                flex: 1;
                justify-content: center;
            }

            .volume-control {
                flex: 1 1 100%;
                justify-content: center;
            }

            .vu-canvas {
                height: 30px;
            }

            .volume-slider {
                width: min(180px, 100%);
            }

            .group {
                padding: 16px;
            }

            .station-list {
                grid-template-columns: 1fr;
            }

            .station-main {
                grid-template-columns: auto minmax(0, 1fr);
            }

            .station-status {
                grid-column: 2;
                justify-content: flex-start;
                margin-top: 2px;
            }

            .recording {
                grid-template-columns: auto minmax(0, 1fr);
            }

            .rec-actions {
                grid-column: 1 / -1;
                flex-direction: row;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <div class="brand">
                <div class="brand-mark" aria-hidden="true">FM</div>
                <div>
                    <div class="brand-title">FM 라디오 모음</div>
                    <div class="brand-sub">KBS · MBC · CBS · SBS와 주요 FM을 한 화면에서</div>
                </div>
            </div>
            <div class="header-actions">
                <button class="mini-open" type="button" onclick="openWidget()" title="작은 창으로 열어 들으면서 다른 일을 할 수 있습니다">미니 플레이어 ↗</button>
                <div class="live-clock" id="liveClock" aria-label="현재 시각">--:--:--</div>
            </div>
        </header>

        <section class="hero-visual" aria-label="튜너 이미지와 상태 창">
            <div class="tuner-stage" id="tunerStage"></div>

        const SKIN_ORDER = ["t2", "mr78", "m10b", "tu9900"];

        function tsFreqToX(f) {
            const c = tunerCfg.freq;
            return c.x88 + (Math.max(88, Math.min(108, f)) - 88) * c.px;
        }

        function tunerSetStation(station) {
            if (!tsFreq) return;
            const d = tunerCfg.digit;
            if (station) {
                const txt = station.freq.toFixed(1);
                tsFreq.textContent = txt;
                tsFreqGlow.textContent = txt;
                tsFreq.style.fill = d.lit;
                tsFreqGlow.style.fill = d.glow;
                tsDialPtr.setAttribute("transform", "translate(" + (tsFreqToX(station.freq) - tunerCfg.freq.drawX).toFixed(1) + ",0)");
                tunerKnobAngle(station.freq);
                highlightStationMark(station.id);
            } else {
                tsFreq.textContent = "--.-";
                tsFreqGlow.textContent = "--.-";
                tsFreq.style.fill = d.dim;
                tsFreqGlow.style.fill = d.dimGlow;
                tsDialPtr.setAttribute("transform", "translate(" + (tsFreqToX(88) - tunerCfg.freq.drawX).toFixed(1) + ",0)");
                tunerKnobAngle(98);
                highlightStationMark(null);
            }
        }

        function tunerSetLeds() {
            tsPanelState = "";   // 다음 동기화 때 강제 갱신
            tsSyncPanel();
        }

        function tunerKnobAngle(freq) {
            if (!tsKnob) return;
            const ang = (Math.max(88, Math.min(108, freq)) - 88) / 20 * 300 - 150;
            tsKnob.setAttribute("transform", "rotate(" + ang.toFixed(1) + " " + tunerCfg.knob.cx + " " + tunerCfg.knob.cy + ")");
        }

        function highlightStationMark(id) {
            if (!tsStationMarks) return;
            const m = tunerCfg.mark;
            tsStationMarks.querySelectorAll("rect").forEach((el) => {
                const on = el.getAttribute("data-station") === id;
                el.setAttribute("fill", on ? m.colorOn : m.color);
                el.setAttribute("height", on ? m.hOn : m.h);
            });
        }

        function nearestStation(freq) {
            return stations.reduce((a, b) => Math.abs(b.freq - freq) < Math.abs(a.freq - freq) ? b : a);
        }

        function clientXToFreq(clientX) {
            const r = tunerSvgEl.getBoundingClientRect();
            const svgX = (clientX - r.left) / r.width * 2000;
            return 88 + (svgX - tunerCfg.freq.x88) / tunerCfg.freq.px;
        }

        // 드래그 중 미리보기 — 바늘·표시·노브를 임의 주파수로 (선택은 손 뗄 때)
        function tunerPreview(freq) {
            freq = Math.max(88, Math.min(108, freq));
            const d = tunerCfg.digit;
            tsDialPtr.setAttribute("transform", "translate(" + (tsFreqToX(freq) - tunerCfg.freq.drawX).toFixed(1) + ",0)");
            const txt = freq.toFixed(1);
            tsFreq.textContent = txt;
            tsFreqGlow.textContent = txt;
            tsFreq.style.fill = d.lit;
            tsFreqGlow.style.fill = d.glow;
            tunerKnobAngle(freq);
            const near = nearestStation(freq);
            nowStation.textContent = near.name;
            playerSubtext.textContent = near.name + " · " + near.freq.toFixed(1) + "MHz — 손을 떼면 선택됩니다.";
        }

        function tunerLoop(now) {
            tsRaf = requestAnimationFrame(tunerLoop);
            ttFrame(now || performance.now());
            if (!tunerCfg) return;
            let target = 0;
            if (isPlaying) {
                if (analyser) {
                    // 데스크톱/안드로이드(MSE): 실제 오디오 레벨로 신호 세기 구동
                    if (!tsFreqData) tsFreqData = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(tsFreqData);
                    const n = Math.floor(tsFreqData.length * 0.6);
                    let sum = 0;
                    for (let i = 0; i < n; i++) sum += tsFreqData[i];
                    target = Math.min(1, (sum / n / 255) * 1.6 + 0.32);
                } else {
                    // iOS 네이티브 HLS: 오디오 분석 불가 → '수신 양호'를 자연스럽게 시뮬레이션
                    target = 0.78 + Math.sin(performance.now() / 300) * 0.08 + (Math.random() - 0.5) * 0.05;
                }
            }
            tsSignal += (target - tsSignal) * 0.16;
            const sc = tunerCfg.signal;
            const sigX = sc.baseX + Math.max(0, Math.min(1, tsSignal)) * sc.travel;
            tsSignalPtr.setAttribute("transform", "translate(" + (sigX - sc.drawX).toFixed(1) + ",0)");

            const tuneTarget = isPlaying ? 0 : 0.85;
            const jitter = isPlaying ? (Math.random() - 0.5) * 0.05 : 0;
            tsTune += (tuneTarget - tsTune) * 0.1 + jitter;
            tsTune = Math.max(-1, Math.min(1, tsTune));
            tsTunePtr.setAttribute("transform", "translate(" + (tsTune * tunerCfg.tune.travel).toFixed(1) + ",0)");
            tsSyncPanel();
        }

        function applyBlend() {
            // 하이블렌드: 고음을 깎아 약전계 잡음을 줄이는 효과 (MSE 경로에서만 실제 적용)
            if (blendFilter) blendFilter.frequency.value = blendOn ? 5000 : 20000;
        }

        function applyMono() {
            // 모노: 게인 노드 입력을 1채널로 강제해 다운믹스
            if (monoGain) {
                monoGain.channelCount = 1;
                monoGain.channelCountMode = monoOn ? "explicit" : "max";
            }
        }

        function tsSyncPanel() {
            if (!tunerCfg || !tsFreq) return;
            const recOn = !!recorder;
            const timerOn = sleepIndex > 0;
            const listOpen = !document.getElementById("stationMain").classList.contains("collapsed");
            const state = [isPlaying, !!currentStation, recOn, blendOn, monoOn, audio.muted, timerOn, listOpen].join(",");
            if (state === tsPanelState) return;
            tsPanelState = state;

            // POWER: T-2 로커는 상/하 색 반전, 그 외 스킨은 액추에이터 이동
            const pwrTop = document.getElementById("tsPwrTop");
            const pwrBot = document.getElementById("tsPwrBot");
            if (pwrTop && pwrBot) {
                pwrTop.setAttribute("fill", isPlaying ? "#54525a" : "#1c1a20");
                pwrBot.setAttribute("fill", isPlaying ? "#1c1a20" : "#54525a");
            }
            const setSw = (id, down) => {
                const el = document.getElementById(id);
                if (el) el.setAttribute("transform", down ? "translate(0," + tunerCfg.swTravel + ")" : "translate(0,0)");
            };
            setSw("tsSwPwr", isPlaying);
            setSw("tsSwRec", recOn);
            setSw("tsSwBlend", blendOn);
            setSw("tsSwMode", monoOn);
            setSw("tsSwMute", audio.muted);
            setSw("tsSwIf", timerOn);
            setSw("tsSwRf", listOpen);

            const setLed = (id, on) => {
                const el = document.getElementById(id);
                if (!el) return;
                el.style.fill = on
                    ? (el.getAttribute("data-on") || tunerCfg.led.on)
                    : (el.getAttribute("data-off") || tunerCfg.led.off);
            };
            const tunerLive = isPlaying && !!currentStation;   // 포노 재생 중엔 튜너 LED 소등
            setLed("tsLedStereo", tunerLive && !monoOn);
            setLed("tsLedLock", tunerLive);
            setLed("tsLedBlend", blendOn);
        }

        // ----- 조작 바인딩 (스킨 마운트마다 다시 연결) -----
        function bindTunerControls() {
            const dial = document.getElementById("tsDialHit");
            let dialDrag = false;
            dial.addEventListener("pointerdown", (e) => {
                dialDrag = true;
                try { dial.setPointerCapture(e.pointerId); } catch (err) {}
                tunerPreview(clientXToFreq(e.clientX));
                e.preventDefault();
            });
            dial.addEventListener("pointermove", (e) => { if (dialDrag) tunerPreview(clientXToFreq(e.clientX)); });
            dial.addEventListener("pointerup", (e) => {
                if (!dialDrag) return;
                dialDrag = false;
                selectStation(nearestStation(clientXToFreq(e.clientX)).id);
            });
            dial.addEventListener("pointercancel", () => { dialDrag = false; });

            const knob = document.getElementById("tsKnobHit");
            let knobDrag = false, knobMoved = false, knobStartX = 0, knobStartFreq = 98;
            knob.addEventListener("pointerdown", (e) => {
                knobDrag = true;
                knobMoved = false;
                knobStartX = e.clientX;
                knobStartFreq = currentStation ? currentStation.freq : 98;
                try { knob.setPointerCapture(e.pointerId); } catch (err) {}
                e.preventDefault();
            });
            knob.addEventListener("pointermove", (e) => {
                if (!knobDrag) return;
                const dx = e.clientX - knobStartX;
                if (Math.abs(dx) > 3) knobMoved = true;
                tunerPreview(knobStartFreq + dx / 14);
            });
            knob.addEventListener("pointerup", (e) => {
                if (!knobDrag) return;
                knobDrag = false;
                if (knobMoved) {
                    selectStation(nearestStation(Math.max(88, Math.min(108, knobStartFreq + (e.clientX - knobStartX) / 14))).id);
                } else {
                    playEasterEgg();
                }
            });
            knob.addEventListener("pointercancel", () => { knobDrag = false; });

            const on = (id, fn) => document.getElementById(id).addEventListener("click", fn);
            on("tsPowerHit", () => { if (currentStation) togglePlay(); });
            on("tsRecHit", () => {
                if (recorder || (currentStation && isPlaying)) {
                    toggleRecording();
                } else {
                    playerSubtext.textContent = "녹음은 재생 중에만 시작할 수 있습니다.";
                }
            });
            on("tsBlendHit", () => {
                blendOn = !blendOn;
                applyBlend();
                playerSubtext.textContent = blendOn ? "하이블렌드 ON — 고음 잡음을 줄입니다." : "하이블렌드 OFF";
            });
            on("tsModeHit", () => {
                monoOn = !monoOn;
                applyMono();
                playerSubtext.textContent = monoOn ? "모노 수신 모드" : "스테레오 수신 모드";
            });
            on("tsMuteHit", () => {
                audio.muted = !audio.muted;
                playerSubtext.textContent = audio.muted ? "음소거되었습니다." : "음소거를 해제했습니다.";
            });
            on("tsIfHit", () => cycleSleepTimer());
            on("tsRfHit", () => toggleStationList());
        }

        function initTunerSkin(id) {
            if (!TUNER_SKINS[id]) id = "t2";
            tunerSkinId = id;
            const skin = TUNER_SKINS[id];
            tunerCfg = skin.cfg;

            const stage = document.getElementById("tunerStage");
            stage.innerHTML = skin.svg;
            tunerSvgEl = stage.querySelector("svg");
            tsFreq = document.getElementById("tsFreq");
            tsFreqGlow = document.getElementById("tsFreqGlow");
            tsDialPtr = document.getElementById("tsDialPtr");
            tsSignalPtr = document.getElementById("tsSignalPtr");
            tsTunePtr = document.getElementById("tsTunePtr");
            tsKnob = document.getElementById("tsKnob");
            tsStationMarks = document.getElementById("tsStationMarks");

            // 히트 영역 생성 (cfg 좌표 기반, 투명)
            Object.keys(TS_HIT_META).forEach((key) => {
                const box = tunerCfg.hits[key];
                if (!box) return;
                const meta = TS_HIT_META[key];
                const r = document.createElementNS(SVG_NS, "rect");
                r.setAttribute("id", "ts" + key.charAt(0).toUpperCase() + key.slice(1) + "Hit");
                r.setAttribute("x", box[0]); r.setAttribute("y", box[1]);
                r.setAttribute("width", box[2]); r.setAttribute("height", box[3]);
                r.setAttribute("fill", "#000"); r.setAttribute("fill-opacity", "0");
                r.setAttribute("style", "cursor:" + meta.cursor + ";touch-action:none");
                const t = document.createElementNS(SVG_NS, "title");
                t.textContent = meta.title;
                r.appendChild(t);
                tunerSvgEl.appendChild(r);
            });
            const kb = tunerCfg.hits.knob;
            const kc = document.createElementNS(SVG_NS, "circle");
            kc.setAttribute("id", "tsKnobHit");
            kc.setAttribute("cx", kb[0]); kc.setAttribute("cy", kb[1]); kc.setAttribute("r", kb[2]);
            kc.setAttribute("fill", "#000"); kc.setAttribute("fill-opacity", "0");
            kc.setAttribute("style", "cursor:grab;touch-action:none");
            const kt = document.createElementNS(SVG_NS, "title");
            kt.textContent = "노브를 좌우로 드래그해 튜닝하세요";
            kc.appendChild(kt);
            tunerSvgEl.appendChild(kc);

            // 방송국 마커 생성
            const m = tunerCfg.mark;
            stations.forEach((st) => {
                const mark = document.createElementNS(SVG_NS, "rect");
                mark.setAttribute("x", (tsFreqToX(st.freq) - 1.5).toFixed(1));
                mark.setAttribute("y", m.y);
                mark.setAttribute("width", "3");
                mark.setAttribute("height", m.h);
                mark.setAttribute("rx", "1");
                mark.setAttribute("fill", m.color);
                mark.setAttribute("data-station", st.id);
                tsStationMarks.appendChild(mark);
            });

            bindTunerControls();
            tsPanelState = "";
            tsSignal = 0;
            tsTune = 0.85;
            tunerSetStation(currentStation);
            tsSyncPanel();
            saveJson("fmRadio.skin", id);
            renderSkinPicker();
        }

        function renderSkinPicker() {
            const el = document.getElementById("skinPicker");
            el.innerHTML = "";
            SKIN_ORDER.forEach((id) => {
                const b = document.createElement("button");
                b.type = "button";
                b.className = "skin-btn" + (id === tunerSkinId ? " active" : "");
                b.textContent = TUNER_SKINS[id].label;
                b.addEventListener("click", () => { if (id !== tunerSkinId) initTunerSkin(id); });
                el.appendChild(b);
            });
        }

        // ===================================================================
        // 하이파이 랙: 이퀄라이저 · 앰프 · 턴테이블
        // ===================================================================

        // ----- 그래픽 이퀄라이저 (YAHAMA GE-5) -----
        const EQ_FREQS = [60, 250, 1000, 4000, 12000];
        const EQ_LABELS = ["60", "250", "1K", "4K", "12K"];
        const EQ_X = [860, 1040, 1220, 1400, 1580];
        const EQ_TOP = 56;
        const EQ_BOT = 156;
        let eqState = loadJson("fmRadio.eq", { on: true, gains: [0, 0, 0, 0, 0] });
        if (!Array.isArray(eqState.gains) || eqState.gains.length !== 5) eqState = { on: true, gains: [0, 0, 0, 0, 0] };

        function applyEq() {
            if (!eqNodes) return;
            eqNodes.forEach((b, i) => { b.gain.value = eqState.on ? eqState.gains[i] : 0; });
        }

        function eqGainToY(g) {
            return EQ_TOP + (12 - g) / 24 * (EQ_BOT - EQ_TOP);
        }

        function mountEq() {
            const sliders = EQ_FREQS.map((f, i) => {
                const x = EQ_X[i];
                return '<rect x="' + (x - 3) + '" y="' + EQ_TOP + '" width="6" height="' + (EQ_BOT - EQ_TOP) + '" rx="3" fill="#0c0b0a" stroke="#2e2b26"/>' +
                    '<rect x="' + (x - 12) + '" y="' + (eqGainToY(0) - 1) + '" width="24" height="2" fill="#4a443c"/>' +
                    '<g id="eqH' + i + '"><rect x="' + (x - 27) + '" y="-9" width="54" height="18" rx="3" fill="#3d3a34" stroke="#57534a"/><rect x="' + (x - 27) + '" y="-1.2" width="54" height="2.4" fill="#ec8255"/></g>' +

        function tubeCurve(k, asym) {
            const n = 1024;
            const c = new Float32Array(n);
            const norm = Math.tanh(k);
            for (let i = 0; i < n; i++) {
                const x = i / (n - 1) * 2 - 1;
                const shifted = x + asym * (1 - x * x);   // 비대칭 → 짝수 배음
                c[i] = Math.tanh(k * shifted) / norm;
            }
            return c;
        }

            ampMid.frequency.value = m.mid[0];

        function needleThump() {
            if (!audioCtx) return;
            try {
                const dur = 0.22;
                const sr = audioCtx.sampleRate;
                const buf = audioCtx.createBuffer(1, Math.floor(sr * dur), sr);
                const d = buf.getChannelData(0);
                for (let i = 0; i < d.length; i++) {
                    const t = i / sr;
                    d[i] = (Math.random() * 2 - 1) * Math.exp(-t * 28) * 0.6 + Math.sin(2 * Math.PI * 38 * t) * Math.exp(-t * 18) * 0.5;
                }
                const s = audioCtx.createBufferSource();
                s.buffer = buf;
                const g = audioCtx.createGain();
                g.gain.value = 0.22;
                s.connect(g);
                g.connect(eqNodes ? eqNodes[0] : audioCtx.destination);
                s.start();
            } catch (e) {}
        }

        function ensureCrackle() {
            if (!audioCtx || !crackleGain || crackleSrc) return;
            try {
                const dur = 3;
                const sr = audioCtx.sampleRate;
                const buf = audioCtx.createBuffer(1, sr * dur, sr);
                const d = buf.getChannelData(0);
                let dust = 0;
                for (let i = 0; i < d.length; i++) {
                    let v = (Math.random() * 2 - 1) * 0.012;      // 표면 노이즈
                    if (Math.random() < 0.00012) dust = 0.25 + Math.random() * 0.75;  // 먼지 팝
                    if (dust > 0.001) { v += (Math.random() * 2 - 1) * dust; dust *= 0.72; }
                    d[i] = v;
                }
                crackleSrc = audioCtx.createBufferSource();
                crackleSrc.buffer = buf;
                crackleSrc.loop = true;
                crackleSrc.connect(crackleGain);
                crackleSrc.start();
            } catch (e) { crackleSrc = null; }
        }

        // ----- 랙 프레임 루프 (플래터 회전·톤암·와우플러터·크랙클·진공관 글로우·VU) -----
        function ttFrame(now) {
            const dt = Math.min(0.05, ttLastTs ? (now - ttLastTs) / 1000 : 0.016);
            ttLastTs = now;

            const rpm = ttRpm45 ? 45 : 100 / 3;
            const spinTarget = (phonoActive && isPlaying) ? 1 : 0;
            const step = spinTarget > ttSpin ? dt / 1.4 : dt / 2.6;   // 스핀업은 빠르게, 런다운은 관성으로
            ttSpin = Math.max(0, Math.min(1, ttSpin + (spinTarget > ttSpin ? 1 : -1) * step));
            if (ttSpin > 0.002) {
                ttAngle = (ttAngle + rpm / 60 * 360 * ttSpin * dt) % 360;
                const g = document.getElementById("ttSpinG");
                if (g) g.setAttribute("transform", "rotate(" + ttAngle.toFixed(2) + " 560 330)");
            }

            // 톤암: 정지 시 암레스트, 재생 시 트랙 진행에 따라 안쪽으로
            let armTarget = -26;
            if (phonoActive && phonoTrack >= 0) {
                const p = (audio.duration > 0 && isFinite(audio.duration)) ? Math.min(1, audio.currentTime / audio.duration) : 0;
                const seg = 21 / RECORD.tracks.length;
                armTarget = -2 + seg * (phonoTrack + p);
            }
            ttArmAng += (armTarget - ttArmAng) * Math.min(1, dt * 3.5);
            const arm = document.getElementById("ttArmG");
            if (arm) arm.setAttribute("transform", "rotate(" + ttArmAng.toFixed(2) + " 1065 120)");

            // 와우·플러터 + 스핀업 피치 + 45회전
            if (phonoActive && isPlaying) {
                const t = now / 1000;
                const wow = 1 + 0.0022 * Math.sin(t * 2 * Math.PI * 0.43) + 0.0007 * Math.sin(t * 2 * Math.PI * 3.1);
                const spinPitch = ttSpin < 0.999 ? (0.5 + 0.5 * ttSpin) : 1;
                const mult = ttRpm45 ? 1.35 : 1;
                try { audio.playbackRate = wow * spinPitch * mult; } catch (e) {}
            }
            if (phonoActive && crackleGain) {
                ensureCrackle();
                const target = (isPlaying && !audio.muted) ? 0.013 : 0;
                crackleGain.gain.value += (target - crackleGain.gain.value) * 0.08;
            }

            // 앰프: 진공관 글로우·VU 바늘·전원 LED
            document.querySelectorAll(".ampGlow").forEach((el) => {
                el.style.opacity = isPlaying ? (0.3 + tsSignal * 0.55) : 0.06;
            });
            const vuAng = -42 + Math.max(0, Math.min(1, tsSignal)) * 84;
            ["ampVuL", "ampVuR"].forEach((id, idx) => {
                const n = document.getElementById(id);
                if (n) n.setAttribute("transform", "rotate(" + (vuAng * (idx ? 0.96 : 1)).toFixed(1) + " " + n.getAttribute("data-cx") + " " + n.getAttribute("data-cy") + ")");
            });
            const pled = document.getElementById("ampPwrLed");
            if (pled) pled.style.fill = isPlaying ? "#ff7a3a" : "#3a2012";
        }

        function shadeColor(hex, amount) {
            const sanitized = hex.replace("#", "");
            const num = parseInt(sanitized, 16);
            const clamp = (value) => Math.max(0, Math.min(255, value));
            const r = clamp((num >> 16) + amount);
            const g = clamp(((num >> 8) & 0x00ff) + amount);
            const b = clamp((num & 0x0000ff) + amount);
            return `#${(r << 16 | g << 8 | b).toString(16).padStart(6, "0")}`;
        }

        function playStream(url) {
            if (hls) {
                hls.destroy();
                hls = null;
            }

            if (typeof Hls !== "undefined" && Hls.isSupported()) {
                // MSE 경로에서는 미리 그래프를 만들어 VU 미터를 켠다.
                // (Safari 네이티브 HLS는 MediaElementSource와 충돌할 수 있어 제외)
                ensureAudioGraph();
                streamLoaded = true;
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true
                });
                hls.loadSource(url);
                hls.attachMedia(audio);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    audio.play().catch(() => {
                        isPlaying = false;
                        updatePlayButton();
                    });
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                            hls.startLoad();
                        } else {
                            stopPlay();
                        }
                    }
                });
            } else if (audio.canPlayType("application/vnd.apple.mpegurl")) {
                streamLoaded = true;
                audio.src = url;
                audio.play().catch(() => {
                    isPlaying = false;
                    updatePlayButton();
                });
            } else {
                playerSubtext.textContent = "이 브라우저는 HLS 스트리밍을 지원하지 않습니다.";
            }
        }

                element.classList.remove("active", "playing", "loading");

            cardsOf(id).forEach((element) => element.classList.add("active", "loading"));
            currentStation = station;
            nowStation.textContent = station.name;
            playerSubtext.textContent = `${station.desc} 스트림에 연결 중입니다.`;
            applyStationTheme(station);
            tunerSetStation(station);

            try {
                const url = await getStreamUrl(station);
                cardsOf(id).forEach((element) => {
                    element.classList.remove("loading");
                    element.classList.add("playing");
                });
                playStream(url);
                isPlaying = true;
                updatePlayButton();
                updateMediaSession();
                saveJson("fmRadio.lastStation", station.id);
                gtag('event', 'play_station', {
                    station_id: station.id,
                    station_name: station.name,
                    station_group: station.group
                });
            } catch (error) {
                cardsOf(id).forEach((element) => element.classList.remove("loading"));
                nowStation.textContent = `${station.name} 연결 실패`;
                playerSubtext.textContent = "스트림 응답이 없거나 브라우저 정책 때문에 재생이 차단되었습니다.";

            }
        }

        // ----- 녹음 -----

        function ensureAudioGraph() {
            if (audioCtx) return true;

            const Ctx = window.AudioContext || window.webkitAudioContext;
            if (!Ctx || !window.MediaRecorder) return false;

            try {
                audioCtx = new Ctx();
                const source = audioCtx.createMediaElementSource(audio);
                gainNode = audioCtx.createGain();
                recDest = audioCtx.createMediaStreamDestination();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 128;
                analyser.smoothingTimeConstant = 0.8;
                // BLEND(고음 감쇠)·MODE(모노 다운믹스) 스위치용 노드를 청취 경로에 삽입
                blendFilter = audioCtx.createBiquadFilter();
                blendFilter.type = "lowpass";
                monoGain = audioCtx.createGain();
                // 그래픽 EQ 5밴드 (peaking)
                eqNodes = EQ_FREQS.map((f) => {
                    const b = audioCtx.createBiquadFilter();
                    b.type = "peaking";
                    b.frequency.value = f;
                    b.Q.value = 1.0;
                    return b;
                });
                // 앰프 스테이지: drive → 진공관 쉐이퍼 → 톤(저/중/고) → 출력
                ampDrive = audioCtx.createGain();
                ampShaper = audioCtx.createWaveShaper();
                ampShaper.oversample = "4x";
                ampBass = audioCtx.createBiquadFilter();
                ampBass.type = "lowshelf";
                ampMid = audioCtx.createBiquadFilter();
                ampMid.type = "peaking";
                ampTreble = audioCtx.createBiquadFilter();
                ampTreble.type = "highshelf";
                ampOut = audioCtx.createGain();
                let head = source.connect(gainNode).connect(blendFilter).connect(monoGain);
                eqNodes.forEach((b) => { head = head.connect(b); });
                head.connect(ampDrive).connect(ampShaper).connect(ampBass).connect(ampMid).connect(ampTreble).connect(ampOut).connect(audioCtx.destination);
                // 바이닐 크랙클 (포노 재생 시에만 게인이 올라간다) — EQ 앞에 섞어 앰프 음색까지 입힌다
                crackleGain = audioCtx.createGain();
                crackleGain.gain.value = 0;
                crackleGain.connect(eqNodes[0]);
                source.connect(recDest);
                source.connect(analyser);
                applyBlend();
                applyMono();
                applyEq();
                applyAmp();
                gainNode.gain.value = volumeLevel;
                audio.volume = 1;
                if (audioCtx.state === "suspended") {
                    audioCtx.resume();
                }
                if (isPlaying) startVu();
                return true;
            } catch (error) {
                console.error(error);
                audioCtx = null;
                gainNode = null;
                recDest = null;
                analyser = null;
                blendFilter = null;
                monoGain = null;
                eqNodes = null;
                ampDrive = null;
                ampShaper = null;
                ampBass = null;
                ampMid = null;
                ampTreble = null;
                ampOut = null;
                crackleGain = null;
                return false;
            }
        }

        function pickRecMime() {
            const candidates = [
                "audio/webm;codecs=opus",
                "audio/webm",
                "audio/mp4;codecs=mp4a.40.2",
                "audio/mp4",
                "audio/ogg;codecs=opus"
            ];
            return candidates.find((type) => MediaRecorder.isTypeSupported(type)) || "";
        }

        function toggleRecording() {
            if (recorder) {
                stopRecording();
                return;
            }

            if (!isPlaying) return;

            if (!ensureAudioGraph()) {
                playerSubtext.textContent = "이 브라우저에서는 녹음을 지원하지 않습니다.";
                return;
            }

            if (audioCtx.state === "suspended") {
                audioCtx.resume();
            }

            const mime = pickRecMime();
            let rec;
            try {
                rec = new MediaRecorder(recDest.stream, mime ? { mimeType: mime, audioBitsPerSecond: 128000 } : undefined);
            } catch (error) {
                console.error(error);
                playerSubtext.textContent = "녹음을 시작할 수 없습니다.";
                return;
            }

            const chunks = [];
            const station = currentStation || {
                id: "phono",
                name: (phonoActive && phonoTrack >= 0) ? RECORD.tracks[phonoTrack].t : "레코드"
            };
            const startMs = Date.now();
            const startDate = new Date();

            rec.ondataavailable = (event) => {
                if (event.data && event.data.size > 0) chunks.push(event.data);
            };
            rec.onstop = async () => {
                if (!chunks.length) return;
                const durationMs = Date.now() - startMs;
                const type = rec.mimeType || chunks[0].type || "audio/webm";
                const record = {
                    stationId: station.id,
                    stationName: station.name,
                    startedAt: startDate.toISOString(),
                    durationMs,
                    type,
                    blob: new Blob(chunks, { type })
                };
                record.dbId = await persistRecording(record);
                addRecordingItem(record);
                playerSubtext.textContent = `${station.name} 녹음 1건을 저장 목록에 추가했습니다.`;
                gtag('event', 'record_save', {
                    station_id: station.id,
                    station_name: station.name,
                    duration_seconds: Math.round(durationMs / 1000)
                });
            };

            recorder = rec;
            recStartMs = startMs;
            rec.start(1000);

            recTimerId = setInterval(updateRecTime, 500);
            updateRecTime();
            btnRec.classList.add("recording");
            btnRec.setAttribute("aria-label", "녹음 정지 및 저장");
            playerSubtext.textContent = `${station.name} 녹음 중입니다. 정지하거나 채널을 바꾸면 자동 저장됩니다.`;

            gtag('event', 'record_start', {
                station_id: station.id,
                station_name: station.name
            });
        }

        function stopRecording() {
            if (!recorder) return;

            const active = recorder;
            recorder = null;

            clearInterval(recTimerId);
            recTimerId = null;
            btnRec.classList.remove("recording");
            btnRec.setAttribute("aria-label", "녹음 시작");
            recTimeEl.textContent = "REC";
            updateRecButton();

            if (active.state !== "inactive") {
                active.stop();
            }
        }

        function recFileExtension(mimeType) {
            if (mimeType.includes("mp4")) return "m4a";
            if (mimeType.includes("ogg")) return "ogg";
            return "webm";
        }

        function formatDuration(ms) {
            const totalSeconds = Math.max(0, Math.floor(ms / 1000));
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            const pad = (value) => String(value).padStart(2, "0");
            return hours > 0 ? `${hours}:${pad(minutes)}:${pad(seconds)}` : `${pad(minutes)}:${pad(seconds)}`;
        }

        function formatSize(bytes) {
            if (bytes >= 1024 * 1024) return `${(bytes / (1024 * 1024)).toFixed(1)}MB`;
            return `${Math.max(1, Math.round(bytes / 1024))}KB`;
        }

        function updateRecTime() {
            recTimeEl.textContent = formatDuration(Date.now() - recStartMs);
        }

        function updateRecButton() {
            btnRec.disabled = !recorder && !isPlaying;
        }

        function addRecordingItem(record) {
            recordingCount += 1;
            const startDate = new Date(record.startedAt);
            const url = URL.createObjectURL(record.blob);
            const ext = recFileExtension(record.type);
            const pad = (value) => String(value).padStart(2, "0");
            const stamp = `${startDate.getFullYear()}${pad(startDate.getMonth() + 1)}${pad(startDate.getDate())}_${pad(startDate.getHours())}${pad(startDate.getMinutes())}${pad(startDate.getSeconds())}`;
            const safeName = record.stationName.replace(/[\\/:*?"<>|]/g, "").replace(/\s+/g, "-");
            const fileName = `${safeName}_${stamp}.${ext}`;
            const startLabel = `${startDate.getMonth() + 1}/${startDate.getDate()} ${pad(startDate.getHours())}:${pad(startDate.getMinutes())} 시작`;

            const item = document.createElement("div");
            item.className = "recording";

            const badge = document.createElement("div");
            badge.className = "rec-badge";
            badge.textContent = "REC";

            const info = document.createElement("div");
            info.className = "rec-info";

            const name = document.createElement("div");
            name.className = "rec-name";
            name.textContent = record.stationName;

            const meta = document.createElement("div");
            meta.className = "rec-meta";
            meta.textContent = `${startLabel} · ${formatDuration(record.durationMs)} · ${formatSize(record.blob.size)}`;

            const preview = document.createElement("audio");
            preview.controls = true;
            preview.preload = "metadata";
            preview.src = url;

            info.append(name, meta, preview);

            const actions = document.createElement("div");
            actions.className = "rec-actions";

            const download = document.createElement("a");
            download.className = "rec-btn";
            download.href = url;
            download.download = fileName;
            download.textContent = "저장";

            const remove = document.createElement("button");
            remove.className = "rec-btn danger";
            remove.type = "button";
            remove.textContent = "삭제";
            remove.addEventListener("click", () => {
                preview.pause();
                URL.revokeObjectURL(url);
                deleteRecording(record.dbId);
                item.remove();
                recordingCount -= 1;
                updateRecordingsNote();
            });

            actions.append(download, remove);
            item.append(badge, info, actions);
            recordingList.prepend(item);
            updateRecordingsNote();
        }

        function updateRecordingsNote() {
            recordingsGroup.hidden = recordingCount === 0;
            const keepNote = recDb
                ? "녹음 파일은 이 브라우저에 보관됩니다."
                : "페이지를 닫으면 목록이 사라집니다. 필요한 파일은 저장해 두세요.";
            recordingsNote.textContent = `${recordingCount}개 · ${keepNote}`;
        }

        function openRecordingDb() {
            if (!window.indexedDB) return;
            try {
                const request = indexedDB.open("fm-radio", 1);
                request.onupgradeneeded = () => {
                    request.result.createObjectStore("recordings", { keyPath: "id", autoIncrement: true });
                };
                request.onsuccess = () => {
                    recDb = request.result;
                    restoreRecordings();
                    updateRecordingsNote();
                };
                request.onerror = () => {
                    console.error(request.error);
                };
            } catch (error) {
                console.error(error);
            }
        }

        function persistRecording(record) {
            return new Promise((resolve) => {
                if (!recDb) return resolve(null);
                try {
                    const request = recDb
                        .transaction("recordings", "readwrite")
                        .objectStore("recordings")
                        .add(record);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => resolve(null);
                } catch (error) {
                    console.error(error);
                    resolve(null);
                }
            });
        }

        function deleteRecording(dbId) {
            if (!recDb || dbId == null) return;
            try {
                recDb.transaction("recordings", "readwrite").objectStore("recordings").delete(dbId);
            } catch (error) {
                console.error(error);
            }
        }

        function restoreRecordings() {
            try {
                const request = recDb.transaction("recordings").objectStore("recordings").getAll();
                request.onsuccess = () => {
                    for (const saved of request.result) {
                        addRecordingItem({ ...saved, dbId: saved.id });
                    }
                };
            } catch (error) {
                console.error(error);
            }
        }

        // ----- 취침 타이머 -----

        function cycleSleepTimer() {
            sleepIndex = (sleepIndex + 1) % SLEEP_STEPS.length;
            const minutes = SLEEP_STEPS[sleepIndex];

            clearInterval(sleepTicker);
            sleepTicker = null;

            if (!minutes) {
                sleepDeadline = 0;
                btnTimer.classList.remove("armed");
                btnTimer.setAttribute("aria-label", "취침 타이머 설정");
                timerLabel.textContent = "타이머";
                return;
            }

            sleepDeadline = Date.now() + minutes * 60000;
            btnTimer.classList.add("armed");
            btnTimer.setAttribute("aria-label", `취침 타이머 ${minutes}분, 누르면 변경`);
            updateSleepLabel();
            sleepTicker = setInterval(() => {
                if (Date.now() >= sleepDeadline) {
                    expireSleepTimer();
                } else {
                    updateSleepLabel();
                }
            }, 1000);

            gtag('event', 'set_sleep_timer', { minutes });
        }

        function updateSleepLabel() {
            timerLabel.textContent = formatDuration(sleepDeadline - Date.now());
        }

        function expireSleepTimer() {
            clearInterval(sleepTicker);
            sleepTicker = null;
            sleepIndex = 0;
            sleepDeadline = 0;
            btnTimer.classList.remove("armed");
            btnTimer.setAttribute("aria-label", "취침 타이머 설정");
            timerLabel.textContent = "타이머";
            stopPlay();
            playerSubtext.textContent = "취침 타이머가 끝나 재생을 정지했습니다.";
        }

        // ----- VU 미터 -----

        function startVu() {
            if (!analyser || vuRaf) return;
            vuData = new Uint8Array(analyser.frequencyBinCount);
            vuRaf = requestAnimationFrame(drawVu);
        }

        function stopVu() {
            if (vuRaf) cancelAnimationFrame(vuRaf);
            vuRaf = null;
            vuCtx.setTransform(1, 0, 0, 1, 0, 0);
            vuCtx.clearRect(0, 0, vuCanvas.width, vuCanvas.height);
        }

        function drawVu() {
            vuRaf = requestAnimationFrame(drawVu);

            const dpr = window.devicePixelRatio || 1;
            const width = vuCanvas.clientWidth;
            const height = vuCanvas.clientHeight;
            if (vuCanvas.width !== Math.round(width * dpr) || vuCanvas.height !== Math.round(height * dpr)) {
                vuCanvas.width = Math.round(width * dpr);
                vuCanvas.height = Math.round(height * dpr);
            }

            vuCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
            vuCtx.clearRect(0, 0, width, height);
            analyser.getByteFrequencyData(vuData);

            const bars = 48;
            const gap = 3;
            const barWidth = (width - gap * (bars - 1)) / bars;
            vuCtx.fillStyle = accentColor;
            for (let i = 0; i < bars; i++) {
                // 라디오 음성 대역이 몰려 있는 저·중역(하위 72% bin)만 사용
                const value = vuData[Math.floor((i / bars) * vuData.length * 0.72)] / 255;
                const barHeight = Math.max(2, value * (height - 6));
                vuCtx.globalAlpha = 0.22 + value * 0.6;
                vuCtx.fillRect(i * (barWidth + gap), height - barHeight, barWidth, barHeight);
            }
            vuCtx.globalAlpha = 1;
        }

        // ----- Media Session / 시계 -----

        function updateMediaSession() {
            if (!("mediaSession" in navigator)) return;
            const artwork = [
                { src: "icons/icon-192.png", sizes: "192x192", type: "image/png" },
                { src: "icons/icon-512.png", sizes: "512x512", type: "image/png" }
            ];
            try {
                if (phonoActive && phonoTrack >= 0) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: RECORD.tracks[phonoTrack].t,
                        artist: RECORD.composer + " · " + RECORD.performer,
                        album: RECORD.title + " (" + RECORD.bwv + ")",
                        artwork
                    });
                    return;
                }
                if (!currentStation) return;
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: currentStation.name,
                    artist: currentStation.desc || "FM 라디오",
                    album: "FM 라디오 모음",
                    artwork
                });
            } catch (error) {
                console.error(error);
            }
        }

        if ("mediaSession" in navigator) {
            try {
                navigator.mediaSession.setActionHandler("play", togglePlay);
                navigator.mediaSession.setActionHandler("pause", togglePlay);
                navigator.mediaSession.setActionHandler("previoustrack", () => stepStation(-1));
                navigator.mediaSession.setActionHandler("nexttrack", () => stepStation(1));
            } catch (error) {
                console.error(error);
            }
        }

        function tickClock() {
            const now = new Date();
            const pad = (value) => String(value).padStart(2, "0");
            liveClock.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
        }

        setInterval(tickClock, 1000);
        tickClock();

        function stepStation(delta) {
            let index = currentStation ? stations.findIndex((item) => item.id === currentStation.id) : -1;
            index = (index + delta + stations.length) % stations.length;
            selectStation(stations[index].id);
        }

        document.addEventListener("keydown", (event) => {
            const onBody = event.target === document.body;
            const onStation = event.target.closest && event.target.closest(".station");

            if (event.code === "Space" && onBody) {
                event.preventDefault();
                togglePlay();
            } else if ((event.code === "ArrowDown" || event.code === "ArrowUp") && (onBody || onStation)) {
                event.preventDefault();
                stepStation(event.code === "ArrowDown" ? 1 : -1);
            }
        });

        audio.addEventListener("pause", () => {
            stopRecording();
            stopVu();
            isPlaying = false;
            updatePlayButton();
            updateActiveStation();
            if ("mediaSession" in navigator) navigator.mediaSession.playbackState = "paused";
            tunerSetLeds(false);
        });

        audio.addEventListener("ended", () => {
            // 포노: 트랙이 끝나면 다음 트랙으로 (음반 한 면을 이어 재생)
            if (phonoActive && phonoTrack >= 0 && phonoTrack < RECORD.tracks.length - 1) {
                playPhonoTrack(phonoTrack + 1);
            } else if (phonoActive) {
                const done = phonoTrack;
                stopPhono();
                isPlaying = false;
                updatePlayButton();
                playerSubtext.textContent = "음반 한 면이 끝났습니다. 톤암이 복귀합니다.";
                gtag('event', 'phono_side_end', { last_track: done });
            }
        });

        audio.addEventListener("playing", () => {
            isPlaying = true;
            updatePlayButton();
            updateActiveStation();
            if ("mediaSession" in navigator) navigator.mediaSession.playbackState = "playing";
            tunerSetLeds(true);
            if (audioCtx && audioCtx.state === "suspended") {
                audioCtx.resume();
            }
            startVu();
            if (currentStation) {
                playerSubtext.textContent = `${currentStation.name} 재생 중입니다.`;
            }
        });

        function openWidget() {
            const query = new URLSearchParams({ skin: "tuner" });
            if (currentStation && stations.some((item) => item.id === currentStation.id)) {
                query.set("station", currentStation.id);
            }
            window.open(`widget.html?${query.toString()}`, "fmRadioWidget", "width=480,height=330,resizable=yes");
            gtag('event', 'open_widget', {
                station_id: currentStation ? currentStation.id : null
            });
        }

        function restoreLastStation() {
            const lastId = loadJson("fmRadio.lastStation", null);
            const station = stations.find((item) => item.id === lastId);
            if (!station) return;

            currentStation = station;
            nowStation.textContent = station.name;
            playerSubtext.textContent = "마지막으로 듣던 채널입니다. 재생 버튼을 누르면 연결합니다.";
            applyStationTheme(station);
            reapplyStationState();
        }

        renderStations();
        restoreLastStation();
        updateRecButton();
        openRecordingDb();
        initTunerSkin(loadJson("fmRadio.skin", "t2"));
        mountEq();
        mountAmp();
        mountTurntable();
        tunerLoop();
    </script>
    <script>
        // PWA 서비스워커 등록 — 앱 셸 캐싱으로 오프라인 실행/즉시 시작 지원.
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("sw.js").catch((error) => {
                    console.warn("서비스워커 등록 실패:", error);
                });
            });
        }
    </script>
</body>
